<script type="module">

    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

    const video = document.getElementById("webcam");

    let faceLandmarker;
    let scene, camera, renderer;
    let lipMesh, lipMaterial;
    let smoothed = null;
    let lastVideoTime = -1;

    /* BANUBA STYLE TRACKING */
    const OUTER = [
        61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291,
        409, 270, 269, 267, 0, 37, 39, 40, 185, 61
    ];

    const INNER = [
        78, 95, 88, 178, 87, 14, 317, 402, 318, 324, 308,
        415, 310, 311, 312, 13, 82, 81, 80, 191, 78
    ];

    async function init() {

        const filesetResolver =
            await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );

        faceLandmarker =
            await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: {
                    modelAssetPath:
                        "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numFaces: 1
            });

        scene = new THREE.Scene();

        camera =
            new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 10);

        camera.position.z = 1;

        renderer =
            new THREE.WebGLRenderer({
                alpha: true,
                antialias: true
            });

        renderer.setSize(640, 480);
        renderer.setPixelRatio(window.devicePixelRatio);

        document
            .getElementById("three_container")
            .appendChild(renderer.domElement);


        /* =====================================
        BANUBA SHADER PRO
        ===================================== */

        lipMaterial = new THREE.ShaderMaterial({

            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false,

            uniforms: {
                uColor: { value: new THREE.Color(0xbe1e2d) },
                uOpacity: { value: 0.58 }
            },

            vertexShader: `

varying vec2 vUv;

void main(){

vUv = uv;

gl_Position =
projectionMatrix *
modelViewMatrix *
vec4(position,1.0);

}

`,

            fragmentShader: `

uniform vec3 uColor;
uniform float uOpacity;

varying vec2 vUv;

void main(){

/* ---------- SHAPE MASK ---------- */

float edgeX =
smoothstep(0.0,0.05,vUv.x) *
smoothstep(0.0,0.05,1.0-vUv.x);

float edgeY =
smoothstep(0.0,0.10,vUv.y) *
smoothstep(0.0,0.10,1.0-vUv.y);

float alpha = edgeX * edgeY;

/* ---------- INNER DARK CAVITY ---------- */

float centerDarkX =
1.0 - abs(vUv.x - 0.5) * 2.0;

float centerDarkY =
1.0 - abs(vUv.y - 0.5) * 2.0;

centerDarkX = pow(centerDarkX,1.2);
centerDarkY = pow(centerDarkY,2.0);

float cavity =
centerDarkX * centerDarkY * 0.55;

/* ---------- LOWER LIP VOLUME ---------- */

float lower =
smoothstep(0.40,0.90,vUv.y);

float lowerVolume =
pow(lower,1.7) * 0.16;

/* ---------- UPPER LIP SHADOW ---------- */

float upper =
1.0 - smoothstep(0.0,0.42,vUv.y);

float upperShadow =
upper * 0.10;

/* ---------- GLOSS CENTRAL ---------- */

float glossX =
1.0 - abs(vUv.x - 0.5) * 2.0;

float glossY =
1.0 - abs(vUv.y - 0.62) * 3.0;

glossX = pow(glossX,3.0);
glossY = max(glossY,0.0);
glossY = pow(glossY,2.0);

float gloss =
glossX * glossY * 0.55;

/* ---------- TOP SHINE ---------- */

float topLine =
smoothstep(0.58,0.78,vUv.y) *
(1.0 - abs(vUv.x - 0.5) * 1.6);

topLine *= 0.14;

/* ---------- COLOR BUILD ---------- */

vec3 col = uColor;

/* cavity dark */
col *= (1.0 - cavity);

/* lower volume light */
col += vec3(lowerVolume);

/* upper shadow */
col *= (1.0 - upperShadow);

/* gloss */
col += vec3(gloss);

/* top line shine */
col += vec3(topLine);

/* slight saturation */
col.r *= 1.08;

/* final */
gl_FragColor =
vec4(col, alpha * uOpacity);

}

`

        });

        lipMesh =
            new THREE.Mesh(
                new THREE.BufferGeometry(),
                lipMaterial
            );

        scene.add(lipMesh);

        startCamera();
    }

    /* =====================================
    CAMERA
    ===================================== */

    function startCamera() {

        navigator.mediaDevices.getUserMedia({
            video: {
                width: 640,
                height: 480,
                frameRate: { ideal: 60, max: 60 }
            }
        }).then(stream => {

            video.srcObject = stream;
            video.requestVideoFrameCallback(loop);

        });

    }

    /* =====================================
    LOOP
    ===================================== */

    function loop() {

        if (video.currentTime !== lastVideoTime) {

            lastVideoTime = video.currentTime;

            const result =
                faceLandmarker.detectForVideo(
                    video,
                    performance.now()
                );

            if (result.faceLandmarks &&
                result.faceLandmarks[0]) {

                updateLips(result.faceLandmarks[0]);

            }
        }

        video.requestVideoFrameCallback(loop);
    }

    /* =====================================
    SMOOTH
    ===================================== */

    function smooth(landmarks) {

        if (!smoothed) {

            smoothed =
                landmarks.map(p => ({
                    x: p.x,
                    y: p.y
                }));

            return;
        }

        for (let i = 0; i < landmarks.length; i++) {

            smoothed[i].x +=
                (landmarks[i].x - smoothed[i].x) * 0.92;

            smoothed[i].y +=
                (landmarks[i].y - smoothed[i].y) * 0.92;

        }
    }

    /* =====================================
    UPDATE LIPS
    ===================================== */

    function updateLips(landmarks) {

        lipMesh.visible = true;

        smooth(landmarks);

        const center = smoothed[13];

        const scaleX = 1.13;
        const scaleY = 1.10;

        function fit(p) {

            return {
                x: center.x + (p.x - center.x) * scaleX,
                y: center.y + (p.y - center.y) * scaleY
            };

        }

        const shape = new THREE.Shape();

        OUTER.forEach((id, i) => {

            const p = fit(smoothed[id]);

            if (i === 0)
                shape.moveTo(p.x, 1 - p.y);
            else
                shape.lineTo(p.x, 1 - p.y);

        });

        const hole = new THREE.Path();

        INNER.forEach((id, i) => {

            const p = fit(smoothed[id]);

            if (i === 0)
                hole.moveTo(p.x, 1 - p.y);
            else
                hole.lineTo(p.x, 1 - p.y);

        });

        shape.holes = [hole];

        if (lipMesh.geometry)
            lipMesh.geometry.dispose();

        lipMesh.geometry =
            new THREE.ShapeGeometry(shape, 4);

        /* UV FIX */

        const pos =
            lipMesh.geometry.attributes.position;

        const box =
            new THREE.Box3()
                .setFromBufferAttribute(pos);

        const size = new THREE.Vector3();
        box.getSize(size);

        const uv =
            new Float32Array(pos.count * 2);

        for (let i = 0; i < pos.count; i++) {

            uv[i * 2] =
                (pos.getX(i) - box.min.x) / size.x;

            uv[i * 2 + 1] =
                (pos.getY(i) - box.min.y) / size.y;
        }

        lipMesh.geometry.setAttribute(
            "uv",
            new THREE.BufferAttribute(uv, 2)
        );

        renderer.render(scene, camera);
    }

    /* =====================================
    UI
    ===================================== */

    window.changeColor = (hex, el) => {

        lipMaterial.uniforms.uColor.value
            .setHex(hex);

        document
            .querySelectorAll(".swatch")
            .forEach(s => s.classList.remove("active"));

        el.classList.add("active");
    };

    window.updateOpacity = (v) => {

        lipMaterial.uniforms.uOpacity.value =
            parseFloat(v);

        document.getElementById("int-val")
            .innerText =
            Math.round(v * 100) + "%";

    };

    init();

</script>
