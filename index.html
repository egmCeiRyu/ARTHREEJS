<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>AR Lipstick Pro - Custom Regulation</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --accent: #ff4d6d;
        }

        body {
            margin: 0;
            background: #050505;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            color: #fff;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 20px 60px rgba(0,0,0,.8);
        }

        video, #three_container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            object-fit: cover;
        }

        .ui-panel {
            margin-top: 25px;
            background: rgba(20,20,20,.95);
            padding: 20px;
            border-radius: 25px;
            width: 550px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #444;
            backdrop-filter: blur(10px);
        }

        .swatches {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .swatch {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: .2s;
        }

            .swatch.active {
                border-color: #fff;
                transform: scale(1.1);
                box-shadow: 0 0 15px rgba(255,255,255,.2);
            }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="three_container"></div>
    </div>

    <div class="ui-panel">
        <div class="swatches">
            <div class="swatch active" style="background:#be1e2d" onclick="changeColor(0xbe1e2d,this)"></div>
            <div class="swatch" style="background:#ff4d6d" onclick="changeColor(0xff4d6d,this)"></div>
            <div class="swatch" style="background:#f28b82" onclick="changeColor(0xf28b82,this)"></div>
            <div class="swatch" style="background:#4a0e1e" onclick="changeColor(0x4a0e1e,this)"></div>
            <div class="swatch" style="background:#000000" onclick="changeColor(0x000000,this)"></div>
        </div>
        <div style="width: 100%;">
            <input type="range" id="opacitySlider" min="0.1" max="1" step="0.01" value="0.58" oninput="updateOpacity(this.value)">
            <div style="display:flex; justify-content: space-between; font-size: 10px; color: #888; margin-top: 8px;">
                <span>NATURAL</span><span id="int-val">58%</span><span>VIVID</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        let faceLandmarker, scene, camera, renderer, lipMesh, lipMaterial;
        let smoothed = null;
        let lastVideoTime = -1;

        const OUTER = [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 375, 321, 405, 314, 17, 84, 181, 91, 146, 61];
        const INNER = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78];

        async function init() {
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numFaces: 1
            });

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 10);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(640, 480);
            document.getElementById("three_container").appendChild(renderer.domElement);

            lipMaterial = new THREE.ShaderMaterial({
                transparent: true,
                uniforms: { uColor: { value: new THREE.Color(0xbe1e2d) }, uOpacity: { value: 0.58 } },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                        uniform vec3 uColor; uniform float uOpacity; varying vec2 vUv;
                        void main() {
                            float mask = smoothstep(0.0, 0.05, vUv.x) * smoothstep(1.0, 0.95, vUv.x) * smoothstep(0.0, 0.15, vUv.y) * smoothstep(1.0, 0.85, vUv.y);
                            float occlusion = mix(0.75, 1.0, smoothstep(0.0, 0.45, abs(vUv.y - 0.5)));
                            float gloss = pow(max(0.0, 1.0 - distance(vUv, vec2(0.5, 0.5)) * 2.5), 5.0) * 0.22;
                            vec3 finalColor = (uColor * occlusion) + vec3(gloss);
                            gl_FragColor = vec4(finalColor, uOpacity * mask);
                        }
                    `
            });

            lipMesh = new THREE.Mesh(new THREE.BufferGeometry(), lipMaterial);
            scene.add(lipMesh);
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } }).then(stream => {
                video.srcObject = stream;
                video.requestVideoFrameCallback(loop);
            });
        }

        function loop() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const result = faceLandmarker.detectForVideo(video, performance.now());
                if (result.faceLandmarks && result.faceLandmarks[0]) updateLips(result.faceLandmarks[0]);
            }
            video.requestVideoFrameCallback(loop);
        }

        function updateLips(landmarks) {
            lipMesh.visible = true;

            // --- 1. SUAVIZAÇÃO DE MOVIMENTO ---
            // Aumente para 0.95 para seguir o rosto mais rápido. Diminua para 0.7 para ser mais lento.
            if (!smoothed) smoothed = landmarks.map(p => ({ x: p.x, y: p.y }));
            else {
                for (let i = 0; i < landmarks.length; i++) {
                    smoothed[i].x += (landmarks[i].x - smoothed[i].x) * 0.85;
                    smoothed[i].y += (landmarks[i].y - smoothed[i].y) * 0.85;
                }
            }

            const center = smoothed[13];
            const shape = new THREE.Shape();

            // --- 2. REGULAGEM DO CONTORNO EXTERNO (BORDA) ---
            OUTER.forEach((id, i) => {
                const p = smoothed[id];

                // LARGURA DA BOCA: Aumente o sX (ex: 1.2) para esticar mais para os lados.
                let sX = 1.15;

                // ALTURA GERAL: Aumente o sY (ex: 1.1) para deixar os lábios mais grossos.
                let sY = 1.02;

                // ARCO DO CUPIDO (TOPO): Diminua (ex: 0.98) para descer a cor e não subir na pele.
                if (id === 37 || id === 0 || id === 267) sY = 1.0;

                // LÁBIO INFERIOR (BASE): Diminua (ex: 0.98) para levantar a cor e não descer no queixo.
                if (id === 17) sY = 1.0;

                const x = center.x + (p.x - center.x) * sX;
                const y = center.y + (p.y - center.y) * sY;
                if (i === 0) shape.moveTo(x, 1 - y);
                else shape.lineTo(x, 1 - y);
            });

            // --- 3. REGULAGEM DO FURO INTERNO (LIMPEZA DOS DENTES) ---
            const hole = new THREE.Path();
            INNER.forEach((id, i) => {
                const p = smoothed[id];

                // LARGURA DO FURO: Deve ser igual ao sX do contorno acima.
                let sX_inner = 1.15;

                // LIMPEZA DOS DENTES: Aumente este sY (ex: 1.08 ou 1.10) para remover a cor dos dentes.
                let sY_inner = 1.05;

                const x = center.x + (p.x - center.x) * sX_inner;
                const y = center.y + (p.y - center.y) * sY_inner;
                if (i === 0) hole.moveTo(x, 1 - y);
                else hole.lineTo(x, 1 - y);
            });
            shape.holes = [hole];

            // --- 4. QUALIDADE DO SHAPE ---
            // Mude de 8 para 12 se quiser bordas mais arredondadas e suaves.
            if (lipMesh.geometry) lipMesh.geometry.dispose();
            lipMesh.geometry = new THREE.ShapeGeometry(shape, 8);

            // Mapeamento UV e renderização final
            const pos = lipMesh.geometry.attributes.position;
            const bBox = new THREE.Box3().setFromBufferAttribute(pos);
            const size = new THREE.Vector3(); bBox.getSize(size);
            const uv = new Float32Array(pos.count * 2);
            for (let i = 0; i < pos.count; i++) {
                uv[i * 2] = (pos.getX(i) - bBox.min.x) / size.x;
                uv[i * 2 + 1] = (pos.getY(i) - bBox.min.y) / size.y;
            }
            lipMesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
            renderer.render(scene, camera);
        }

        window.changeColor = (hex, el) => {
            lipMaterial.uniforms.uColor.value.setHex(hex);
            document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
            el.classList.add("active");
        };

        window.updateOpacity = (v) => {
            lipMaterial.uniforms.uOpacity.value = parseFloat(v);
            document.getElementById("int-val").innerText = Math.round(v * 100) + "%";
        };

        init();
    </script>
</body>
</html>
