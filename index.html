<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ARリップ - 高彩度エディション</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --accent: #ff4d6d;
        }

        body {
            margin: 0;
            background: #050505;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Hiragino Sans', sans-serif;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #333;
        }

        video, #three_container {
            position: absolute;
            width: 640px;
            height: 480px;
            transform: scaleX(-1);
        }

        .ui-panel {
            margin-top: 20px;
            background: rgba(25, 25, 25, 0.95);
            padding: 25px;
            border-radius: 25px;
            width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #444;
        }

        .swatches {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .swatch {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
        }

            .swatch.active {
                border-color: white;
                transform: scale(1.15);
            }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .labels {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 11px;
            color: #666;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <div id="three_container"></div>
    </div>

    <div class="ui-panel">
        <div class="ui-title" style="font-size:12px; color:#888; margin-bottom:10px;">リップカラーを選択</div>
        <div class="swatches">
            <div class="swatch active" style="background: #be1e2d;" onclick="changeColor(0xbe1e2d, this)"></div>
            <div class="swatch" style="background: #ff4d6d;" onclick="changeColor(0xff4d6d, this)"></div>
            <div class="swatch" style="background: #f28b82;" onclick="changeColor(0xf28b82, this)"></div>
            <div class="swatch" style="background: #4a0e1e;" onclick="changeColor(0x4a0e1e, this)"></div>
            <div class="swatch" style="background: #000000;" onclick="changeColor(0x000000, this)"></div>
        </div>
        <input type="range" id="opacitySlider" min="0.1" max="1.0" step="0.01" value="0.8" oninput="updateOpacity(this.value)">
        <div class="labels"><span>薄く</span><span id="int-val">80%</span><span>濃く</span></div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        let faceLandmarker, scene, camera, renderer, lipMesh, lipMaterial;
        let lastVideoTime = -1;
        let smoothedLandmarks = null;

        // 高精度インデックス
        const LIPS_OUTER = [61, 185, 40, 39, 37, 0, 267, 269, 270, 408, 291, 321, 405, 314, 17, 84, 181, 91, 146, 61];
        const LIPS_INNER = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78];

        async function init() {
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`, delegate: "GPU" },
                runningMode: "VIDEO", numFaces: 1
            });

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 10);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(640, 480);
            document.getElementById('three_container').appendChild(renderer.domElement);

            // 高彩度マテリアル設定（NormalBlendingで色をしっかり出す）
            lipMaterial = new THREE.MeshBasicMaterial({
                color: 0xbe1e2d,
                transparent: true,
                opacity: 0.8,
                side: THREE.DoubleSide
            });

            lipMesh = new THREE.Mesh(new THREE.BufferGeometry(), lipMaterial);
            scene.add(lipMesh);
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            });
        }

        async function predictWebcam() {
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    updateVisuals(results.faceLandmarks[0]);
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        window.changeColor = (hex, el) => {
            lipMaterial.color.setHex(hex);
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        };

        window.updateOpacity = (val) => {
            lipMaterial.opacity = val;
            document.getElementById('int-val').innerText = Math.round(val * 100) + "%";
        };

        function updateVisuals(landmarks) {
            if (!smoothedLandmarks) smoothedLandmarks = landmarks;
            else {
                smoothedLandmarks = landmarks.map((p, i) => ({
                    x: smoothedLandmarks[i].x * 0.5 + p.x * 0.5,
                    y: smoothedLandmarks[i].y * 0.5 + p.y * 0.5
                }));
            }

            // yOffsetの微調整：さらに正確にフィットさせる
            const yOffset = 0.003;

            const shape = new THREE.Shape();
            shape.moveTo(smoothedLandmarks[LIPS_OUTER[0]].x, 1 - (smoothedLandmarks[LIPS_OUTER[0]].y + yOffset));
            LIPS_OUTER.forEach(i => shape.lineTo(smoothedLandmarks[i].x, 1 - (smoothedLandmarks[i].y + yOffset)));

            const hole = new THREE.Path();
            hole.moveTo(smoothedLandmarks[LIPS_INNER[0]].x, 1 - (smoothedLandmarks[LIPS_INNER[0]].y + yOffset));
            LIPS_INNER.forEach(i => hole.lineTo(smoothedLandmarks[i].x, 1 - (smoothedLandmarks[i].y + yOffset)));
            shape.holes.push(hole);

            lipMesh.geometry.dispose();
            lipMesh.geometry = new THREE.ShapeGeometry(shape, 16);
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
