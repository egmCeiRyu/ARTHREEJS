<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Makeup Pro - Three.js Full Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        :root { --accent: #ff4d6d; }
        body { margin: 0; background: #0a0a0a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; }
        
        #container { position: relative; width: 640px; height: 480px; background: #000; border-radius: 30px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid #222; }
        video { position: absolute; width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }
        #three_container { position: absolute; width: 100%; height: 100%; transform: scaleX(-1); z-index: 10; pointer-events: none; }
        
        /* Painel de Controle UI */
        .ui-panel { position: absolute; bottom: 20px; z-index: 20; background: rgba(20,20,20,0.85); padding: 20px; border-radius: 25px; width: 85%; display: flex; flex-direction: column; align-items: center; backdrop-filter: blur(10px); border: 1px solid #333; left: 50%; transform: translateX(-50%); }
        .swatches { display: flex; gap: 15px; margin-bottom: 20px; }
        .swatch { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .swatch.active { border-color: white; transform: scale(1.15); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        
        .slider-container { width: 100%; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 6px; border-radius: 5px; }
        .labels { display: flex; justify-content: space-between; width: 100%; font-size: 10px; color: #888; margin-top: 5px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="container">
    <video id="input_video" playsinline></video>
    <div id="three_container"></div>
    
    <div class="ui-panel">
        <div class="swatches">
            <div class="swatch active" style="background: #be1e2d;" onclick="changeColor(0xbe1e2d, this)"></div>
            <div class="swatch" style="background: #8e2a4e;" onclick="changeColor(0x8e2a4e, this)"></div>
            <div class="swatch" style="background: #ff4d6d;" onclick="changeColor(0xff4d6d, this)"></div>
            <div class="swatch" style="background: #f28b82;" onclick="changeColor(0xf28b82, this)"></div>
            <div class="swatch" style="background: #4a0e1e;" onclick="changeColor(0x4a0e1e, this)"></div>
        </div>
        
        <div class="slider-container">
            <input type="range" id="intensitySlider" min="0.1" max="0.9" step="0.01" value="0.4" oninput="updateIntensity(this.value)">
            <div class="labels">
                <span>NATURAL</span>
                <span id="int-val">40%</span>
                <span>VIVID</span>
            </div>
        </div>
    </div>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    let scene, camera, renderer, lipMesh, material;
    let smoothedLandmarks = null;

    // Mapeamento que percorre o contorno externo de ambos os lábios para fechar a malha
    const LIPS_OUTER_FULL = [
        61, 185, 40, 39, 37, 0, 267, 269, 270, 408, 415, // Superior
        291, 375, 321, 405, 314, 17, 84, 181, 91, 146, 61 // Inferior (fechando o ciclo)
    ];

    function initThree() {
        scene = new THREE.Scene();
        // Câmera ortográfica 0-1 para alinhamento direto com MediaPipe
        camera = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 1000);
        camera.position.z = 1;

        renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(640, 480);
        document.getElementById('three_container').appendChild(renderer.domElement);

        material = new THREE.MeshBasicMaterial({ 
            color: 0xbe1e2d, 
            transparent: true, 
            opacity: 0.4,
            side: THREE.DoubleSide 
        });

        const geometry = new THREE.BufferGeometry();
        lipMesh = new THREE.Mesh(geometry, material);
        scene.add(lipMesh);
    }

    window.changeColor = (hex, el) => {
        material.color.setHex(hex);
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
    };

    window.updateIntensity = (val) => {
        material.opacity = val;
        document.getElementById('int-val').innerText = Math.round(val * 100) + "%";
    };

    function onResults(results) {
        if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;

        const landmarks = results.multiFaceLandmarks[0];
        
        // Suavização Temporal (Reduz o tremor)
        if (!smoothedLandmarks) {
            smoothedLandmarks = landmarks;
        } else {
            smoothedLandmarks = landmarks.map((p, i) => ({
                x: (smoothedLandmarks[i].x * 0.75) + (p.x * 0.25),
                y: (smoothedLandmarks[i].y * 0.75) + (p.y * 0.25)
            }));
        }

        const vertices = [];
        LIPS_OUTER_FULL.forEach(idx => {
            const p = smoothedLandmarks[idx];
            // No modo ortográfico 0-1, y é invertido no Three.js
            vertices.push(p.x, 1 - p.y, 0); 
        });

        const vArray = new Float32Array(vertices);
        lipMesh.geometry.setAttribute('position', new THREE.BufferAttribute(vArray, 3));
        
        renderer.render(scene, camera);
    }

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    faceMesh.onResults(onResults);

    const cameraHelper = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        width: 640, height: 480
    });

    initThree();
    cameraHelper.start();
</script>
</body>
</html>
