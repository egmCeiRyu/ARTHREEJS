<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AR Makeup - Full Lip Fill</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 30px;
            overflow: hidden;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        #three_container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            z-index: 10;
            pointer-events: none;
        }

        .ui {
            position: absolute;
            bottom: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 20px;
            width: 80%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .swatches {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
        }

        input[type=range] {
            width: 100%;
            accent-color: #ff4d6d;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="input_video" playsinline></video>
        <div id="three_container"></div>
        <div class="ui">
            <div class="swatches">
                <div class="swatch" style="background: #be1e2d;" onclick="changeColor(0xbe1e2d)"></div>
                <div class="swatch" style="background: #8e2a4e;" onclick="changeColor(0x8e2a4e)"></div>
                <div class="swatch" style="background: #ff4d6d;" onclick="changeColor(0xff4d6d)"></div>
            </div>
            <input type="range" min="0.1" max="0.9" step="0.01" value="0.4" oninput="updateOpacity(this.value)">
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        let scene, camera, renderer, lipMesh, material;
        let smoothedLandmarks = null;

        // Lista de pontos que formam o contorno completo da boca
        const LIPS_OUTER = [61, 185, 40, 39, 37, 0, 267, 269, 270, 408, 415, 291, 375, 321, 405, 314, 17, 84, 181, 91, 146];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 1000);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(640, 480);
            document.getElementById('three_container').appendChild(renderer.domElement);

            material = new THREE.MeshBasicMaterial({
                color: 0xbe1e2d,
                transparent: true,
                opacity: 0.4,
                side: THREE.DoubleSide
            });

            const geometry = new THREE.BufferGeometry();
            lipMesh = new THREE.Mesh(geometry, material);
            scene.add(lipMesh);
        }

        window.changeColor = (hex) => { material.color.setHex(hex); };
        window.updateOpacity = (val) => { material.opacity = val; };

        function onResults(results) {
            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;

            const landmarks = results.multiFaceLandmarks[0];

            if (!smoothedLandmarks) {
                smoothedLandmarks = landmarks;
            } else {
                smoothedLandmarks = landmarks.map((p, i) => ({
                    x: smoothedLandmarks[i].x * 0.7 + p.x * 0.3,
                    y: smoothedLandmarks[i].y * 0.7 + p.y * 0.3
                }));
            }

            const vertices = [];
            const indices = [];

            // PONTO CENTRAL: Usamos o ponto 13 (centro dos lábios) como âncora para preencher
            const center = smoothedLandmarks[13];
            vertices.push(center.x, 1 - center.y, 0); // O índice 0 será o centro

            // Adicionamos os pontos do contorno
            LIPS_OUTER.forEach((idx, i) => {
                const p = smoothedLandmarks[idx];
                vertices.push(p.x, 1 - p.y, 0);

                // Criamos triângulos conectando o centro, o ponto atual e o próximo ponto
                if (i > 0) {
                    indices.push(0, i, i + 1);
                }
            });
            // Fecha o último triângulo com o primeiro ponto do contorno
            indices.push(0, LIPS_OUTER.length, 1);

            const vArray = new Float32Array(vertices);
            lipMesh.geometry.setAttribute('position', new THREE.BufferAttribute(vArray, 3));
            lipMesh.geometry.setIndex(indices); // Define como os triângulos são conectados

            renderer.render(scene, camera);
        }

        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        faceMesh.onResults(onResults);

        const cameraHelper = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({ image: videoElement }); },
            width: 640, height: 480
        });

        init();
        cameraHelper.start();
    </script>
</body>
</html>
