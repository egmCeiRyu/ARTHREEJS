<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AR Lipstick HD Realtime</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --accent: #ff4d6d;
        }

        body {
            margin: 0;
            background: #050505;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI',system-ui,sans-serif;
            color: #fff;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            background: #000;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 20px 60px rgba(0,0,0,.8);
        }

        video, #three_container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            object-fit: cover;
        }

        .ui-panel {
            margin-top: 25px;
            background: rgba(20,20,20,.95);
            padding: 20px;
            border-radius: 25px;
            width: 550px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #444;
            backdrop-filter: blur(10px);
        }

        .ui-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .swatches {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .swatch {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: .2s;
        }

            .swatch.active {
                border-color: #fff;
                transform: scale(1.1);
                box-shadow: 0 0 15px rgba(255,255,255,.2);
            }

        .slider-container {
            width: 100%;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            height: 6px;
            cursor: pointer;
        }

        .labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #666;
            margin-top: 8px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="three_container"></div>
    </div>

    <div class="ui-panel">
        <div class="ui-title">カラーを選択してください</div>

        <div class="swatches">
            <div class="swatch active" style="background:#be1e2d" onclick="changeColor(0xbe1e2d,this)"></div>
            <div class="swatch" style="background:#ff4d6d" onclick="changeColor(0xff4d6d,this)"></div>
            <div class="swatch" style="background:#f28b82" onclick="changeColor(0xf28b82,this)"></div>
            <div class="swatch" style="background:#4a0e1e" onclick="changeColor(0x4a0e1e,this)"></div>
            <div class="swatch" style="background:#000000" onclick="changeColor(0x000000,this)"></div>
        </div>

        <div class="slider-container">
            <input type="range" id="opacitySlider" min="0.1" max="1" step="0.01" value="0.45" oninput="updateOpacity(this.value)">
            <div class="labels">
                <span>ナチュラル</span>
                <span id="int-val">45%</span>
                <span>ビビッド</span>
            </div>
        </div>
    </div>

    <script type="module">
        import {
            FaceLandmarker,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        let faceLandmarker, scene, camera, renderer, lipMesh, lipMaterial;
        let smoothed = null;
        let lastVideoTime = -1;

        const OUTER = [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 375, 321, 405, 314, 17, 84, 181, 91, 146, 61];
        const INNER = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78];

        async function init() {
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numFaces: 1
            });

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 10);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(640, 480);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById("three_container").appendChild(renderer.domElement);

            // --- CARREGAMENTO DA TEXTURA ---
            const loader = new THREE.TextureLoader();
            const lipTexture = loader.load('lips.png'); // <--- INSIRA O LINK AQUI

            // --- MATERIAL COM TEXTURA E BRILHO (PHONG) ---
            lipMaterial = new THREE.MeshPhongMaterial({
                color: 0xbe1e2d,
                map: lipTexture,
                transparent: true,
                opacity: 0.45,
                side: THREE.DoubleSide,
                depthWrite: false,
                specular: 0x444444, // Cor do reflexo
                shininess: 30       // Intensidade do gloss
            });

            // --- LUZES PARA REAGIR COM A TEXTURA ---
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 0.5);
            pointLight.position.set(0.5, 0.5, 1);
            scene.add(pointLight);

            lipMesh = new THREE.Mesh(new THREE.BufferGeometry(), lipMaterial);
            scene.add(lipMesh);

            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480, frameRate: { ideal: 60 } }
            }).then(stream => {
                video.srcObject = stream;
                video.requestVideoFrameCallback(loop);
            });
        }

        function loop() {
            if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const result = faceLandmarker.detectForVideo(video, performance.now());
                if (result.faceLandmarks && result.faceLandmarks[0]) {
                    updateLips(result.faceLandmarks[0]);
                } else {
                    lipMesh.visible = false;
                    renderer.render(scene, camera);
                }
            }
            video.requestVideoFrameCallback(loop);
        }

        function smooth(landmarks) {
            if (!smoothed) {
                smoothed = landmarks.map(p => ({ x: p.x, y: p.y, z: p.z }));
                return;
            }
            const factor = 0.8;
            for (let i = 0; i < landmarks.length; i++) {
                smoothed[i].x += (landmarks[i].x - smoothed[i].x) * factor;
                smoothed[i].y += (landmarks[i].y - smoothed[i].y) * factor;
            }
        }

        function updateLips(landmarks) {
            lipMesh.visible = true;
            smooth(landmarks);

            const center = smoothed[13];
            const scaleX = 1.04;
            const scaleY = 1.08;

            const shape = new THREE.Shape();
            OUTER.forEach((id, i) => {
                const p = smoothed[id];
                const x = center.x + (p.x - center.x) * scaleX;
                const y = center.y + (p.y - center.y) * scaleY;
                if (i === 0) shape.moveTo(x, 1 - y);
                else shape.lineTo(x, 1 - y);
            });

            const hole = new THREE.Path();
            INNER.forEach((id, i) => {
                const p = smoothed[id];
                const x = center.x + (p.x - center.x) * scaleX;
                const y = center.y + (p.y - center.y) * scaleY;
                if (i === 0) hole.moveTo(x, 1 - y);
                else hole.lineTo(x, 1 - y);
            });
            shape.holes = [hole];

            if (lipMesh.geometry) lipMesh.geometry.dispose();
            lipMesh.geometry = new THREE.ShapeGeometry(shape, 4);

            // --- MAPEAMENTO UV PARA A TEXTURA ---
            const pos = lipMesh.geometry.attributes.position;
            const bBox = new THREE.Box3().setFromBufferAttribute(pos);
            const size = new THREE.Vector3();
            bBox.getSize(size);
            const uv = new Float32Array((pos.count) * 2);
            for (let i = 0; i < pos.count; i++) {
                uv[i * 2] = (pos.getX(i) - bBox.min.x) / size.x;
                uv[i * 2 + 1] = (pos.getY(i) - bBox.min.y) / size.y;
            }
            lipMesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uv, 2));

            renderer.render(scene, camera);
        }

        window.changeColor = (hex, el) => {
            lipMaterial.color.setHex(hex);
            document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
            el.classList.add("active");
        };

        window.updateOpacity = (v) => {
            lipMaterial.opacity = v;
            document.getElementById("int-val").innerText = Math.round(v * 100) + "%";
        };

        init();
    </script>
</body>
</html>
