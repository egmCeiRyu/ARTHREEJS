<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AR Lipstick HD - No Aura Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --accent: #ff4d6d;
        }

        body {
            margin: 0;
            background: #050505;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            color: #fff;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid #333;
        }

        video, #three_container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            object-fit: cover;
        }

        .ui-panel {
            margin-top: 25px;
            background: rgba(20,20,20,.95);
            padding: 20px;
            border-radius: 25px;
            width: 550px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #444;
            backdrop-filter: blur(10px);
        }

        .swatches {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .swatch {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
        }

            .swatch.active {
                border-color: #fff;
                transform: scale(1.1);
            }

        .slider-container {
            width: 100%;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="three_container"></div>
    </div>

    <div class="ui-panel">
        <div class="swatches">
            <div class="swatch active" style="background:#be1e2d" onclick="changeColor(0xbe1e2d,this)"></div>
            <div class="swatch" style="background:#ff4d6d" onclick="changeColor(0xff4d6d,this)"></div>
            <div class="swatch" style="background:#f28b82" onclick="changeColor(0xf28b82,this)"></div>
            <div class="swatch" style="background:#4a0e1e" onclick="changeColor(0x4a0e1e,this)"></div>
            <div class="swatch" style="background:#000000" onclick="changeColor(0x000000,this)"></div>
        </div>
        <div class="slider-container">
            <input type="range" id="opacitySlider" min="0.1" max="1" step="0.01" value="0.6" oninput="updateOpacity(this.value)">
            <div class="labels" style="display:flex; justify-content: space-between; font-size: 10px; color: #888;">
                <span>NATURAL</span><span id="int-val">60%</span><span>VIVID</span>
            </div>
        </div>
    </div>

    <script type="module">
        import {
            FaceLandmarker,
            FilesetResolver
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        let faceLandmarker;
        let scene, camera, renderer, lipMesh, lipMaterial;
        let smoothed = null;
        let lastVideoTime = -1;

        // Configurações de índices
        const OUTER = [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 375, 321, 405, 314, 17, 84, 181, 91, 146, 61];
        const INNER = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78];

        // COR DE INÍCIO DA UI (vermelho)
        let currentLipColor = new THREE.Color(0xbe1e2d);

        async function init() {
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numFaces: 1
            });

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 10);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(640, 480);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById("three_container").appendChild(renderer.domElement);

            // --- NOVO MATERIAL SHADER (ULTRA REALISTA) ---
            // Usamos ShaderMaterial para controlar a suavização da borda matematicamente.
            lipMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uColor: { value: currentLipColor },
                    uOpacity: { value: 0.56 }, // Valor inicial da UI (56%)
                    uEdgeSoftness: { value: 0.15 } // Controla o feathering da borda
                },
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false,
                blending: THREE.CustomBlending,
                blendEquation: THREE.AddEquation,
                blendSrc: THREE.SrcAlphaFactor,
                blendDst: THREE.OneMinusSrcAlphaFactor,

                vertexShader: `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
                fragmentShader: `
            uniform vec3 uColor;
            uniform float uOpacity;
            uniform float uEdgeSoftness;
            varying vec2 vUv;
            
            void main() {
                // Cria um gradiente radial procedural para o Alpha
                // Centralizado nos lábios (0.5, 0.5)
                float dist = distance(vUv, vec2(0.5, 0.5));
                
                // Suaviza a borda externa usando uEdgeSoftness
                float alpha = smoothstep(0.5, 0.5 - uEdgeSoftness, dist);
                
                // Aplica a cor e a opacidade total da UI
                gl_FragColor = vec4(uColor, alpha * uOpacity);
            }
        `
            });

            lipMesh = new THREE.Mesh(new THREE.BufferGeometry(), lipMaterial);
            scene.add(lipMesh);

            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480, frameRate: { ideal: 60 } }
            }).then(stream => {
                video.srcObject = stream;
                video.requestVideoFrameCallback(loop);
            });
        }

        function loop() {
            if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const result = faceLandmarker.detectForVideo(video, performance.now());
                if (result.faceLandmarks && result.faceLandmarks[0]) {
                    updateLips(result.faceLandmarks[0]);
                } else {
                    lipMesh.visible = false;
                    renderer.render(scene, camera);
                }
            }
            video.requestVideoFrameCallback(loop);
        }

        function smooth(landmarks) {
            if (!smoothed) {
                smoothed = landmarks.map(p => ({ x: p.x, y: p.y }));
                return;
            }
            const factor = 0.85; // Estabilização rápida
            for (let i = 0; i < landmarks.length; i++) {
                smoothed[i].x += (landmarks[i].x - smoothed[i].x) * factor;
                smoothed[i].y += (landmarks[i].y - smoothed[i].y) * factor;
            }
        }

        function updateLips(landmarks) {
            lipMesh.visible = true;
            smooth(landmarks);

            const center = smoothed[13];
            const scaleX = 1.01; // Ajuste micro para não criar aura
            const scaleY = 1.01;

            const shape = new THREE.Shape();
            OUTER.forEach((id, i) => {
                const p = smoothed[id];
                const x = center.x + (p.x - center.x) * scaleX;
                const y = center.y + (p.y - center.y) * scaleY;
                if (i === 0) shape.moveTo(x, 1 - y);
                else shape.lineTo(x, 1 - y);
            });

            const hole = new THREE.Path();
            INNER.forEach((id, i) => {
                const p = smoothed[id];
                const x = center.x + (p.x - center.x) * scaleX;
                const y = center.y + (p.y - center.y) * scaleY;
                if (i === 0) hole.moveTo(x, 1 - y);
                else hole.lineTo(x, 1 - y);
            });
            shape.holes = [hole];

            if (lipMesh.geometry) lipMesh.geometry.dispose();
            lipMesh.geometry = new THREE.ShapeGeometry(shape, 4);

            // --- MAPEAMENTO UV PARA O SHADER FUNCIONAR ---
            const pos = lipMesh.geometry.attributes.position;
            const bBox = new THREE.Box3().setFromBufferAttribute(pos);
            const size = new THREE.Vector3();
            bBox.getSize(size);
            const uv = new Float32Array((pos.count) * 2);
            for (let i = 0; i < pos.count; i++) {
                uv[i * 2] = (pos.getX(i) - bBox.min.x) / size.x;
                uv[i * 2 + 1] = (pos.getY(i) - bBox.min.y) / size.y;
            }
            lipMesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uv, 2));

            renderer.render(scene, camera);
        }

        // --- HANDLERS DE UI ATUALIZADOS PARA O SHADER ---
        window.changeColor = (hex, el) => {
            // Atualiza a cor no uniforme do shader
            lipMaterial.uniforms.uColor.value.setHex(hex);

            document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
            el.classList.add("active");
        };

        window.updateOpacity = (v) => {
            // Atualiza a opacidade no uniforme do shader
            lipMaterial.uniforms.uOpacity.value = parseFloat(v);

            document.getElementById("int-val").innerText = Math.round(v * 100) + "%";
        };

        init();
    </script>
</body>
</html>
