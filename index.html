<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Makeup Studio - Fixed & Realtime</title>
    <style>
        :root {
            --accent: #ff4d6d;
        }

        body {
            margin: 0;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #333;
            background: #000;
        }

        /* Camadas de vídeo e render */
        video#input-video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            visibility: hidden;
        }

        canvas#three-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            transform: scaleX(-1);
        }

        .ui-panel {
            margin-top: 20px;
            background: rgba(25, 25, 25, 0.95);
            padding: 25px;
            border-radius: 30px;
            width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #444;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .swatches {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 22px;
        }

        .swatch {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
        }

            .swatch.active {
                border-color: white;
                transform: scale(1.1);
                box-shadow: 0 0 15px var(--accent);
            }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .labels {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 11px;
            color: #888;
            margin-top: 10px;
            font-weight: bold;
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #222;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="loading">
            <div class="spinner"></div>
            <p style="margin-top:15px; font-size:12px; color: #666;">LOADING AR ENGINE...</p>
        </div>
        <video id="input-video" autoplay playsinline></video>
        <canvas id="three-canvas"></canvas>
    </div>

    <div class="ui-panel">
        <div class="swatches">
            <div id="btn-red" class="swatch active" style="background: #be1e2d;"></div>
            <div id="btn-pink" class="swatch" style="background: #ff4d6d;"></div>
            <div id="btn-nude" class="swatch" style="background: #f28b82;"></div>
            <div id="btn-dark" class="swatch" style="background: #4a0e1e;"></div>
            <div id="btn-black" class="swatch" style="background: #000000;"></div>
        </div>
        <div style="width:100%">
            <input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="0.6">
            <div class="labels"><span>NATURAL</span><span id="val">60%</span><span>VIVID</span></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('three-canvas');
        const loadingElement = document.getElementById('loading');

        let scene, camera, renderer, lipsMesh, lipstickMaterial;
        let faceMesh;

        // Índices MediaPipe para contorno e preenchimento
        const LIP_OUTLINE = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291];
        const LIP_INNER = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 292, 306, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 185, 40, 39, 37, 0, 267, 269, 270, 409];
        const ALL_LIP_INDICES = [...new Set([...LIP_OUTLINE, ...LIP_INNER])];

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.Camera();

            renderer = new THREE.WebGLRenderer({
                canvas: canvasElement,
                alpha: true,
                antialias: true,
                powerPreference: "high-performance"
            });
            renderer.setSize(640, 480);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Shader customizado para curvas e brilho suave
            lipstickMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uColor: { value: new THREE.Color(0xbe1e2d) },
                    uOpacity: { value: 0.6 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 uColor;
                    uniform float uOpacity;
                    varying vec2 vUv;
                    void main() {
                        float dist = length(vUv - vec2(0.5, 0.5));
                        float mask = smoothstep(0.5, 0.2, dist);
                        gl_FragColor = vec4(uColor, uOpacity * mask);
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide,
                depthTest: false
            });

            const geometry = new THREE.BufferGeometry();
            lipsMesh = new THREE.Mesh(geometry, lipstickMaterial);
            lipsMesh.visible = false; // Começa invisível para evitar o triângulo no centro
            scene.add(lipsMesh);
        }

        function onResults(results) {
            if (loadingElement.style.display !== 'none') loadingElement.style.display = 'none';

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                lipsMesh.visible = true; // Só mostra se houver rosto

                const landmarks = results.multiFaceLandmarks[0];
                const positions = new Float32Array(ALL_LIP_INDICES.length * 3);
                const uvs = new Float32Array(ALL_LIP_INDICES.length * 2);
                const indices = [];

                ALL_LIP_INDICES.forEach((idx, i) => {
                    const p = landmarks[idx];
                    positions[i * 3] = (p.x - 0.5) * 2;
                    positions[i * 3 + 1] = (0.5 - p.y) * 2;
                    positions[i * 3 + 2] = -p.z;
                    uvs[i * 2] = p.x;
                    uvs[i * 2 + 1] = p.y;
                });

                for (let i = 0; i < LIP_OUTLINE.length - 1; i++) {
                    indices.push(i, i + 1, LIP_OUTLINE.length + i);
                    indices.push(i + 1, LIP_OUTLINE.length + i + 1, LIP_OUTLINE.length + i);
                }

                lipsMesh.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                lipsMesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
                lipsMesh.geometry.setIndex(indices);
                lipsMesh.geometry.attributes.position.needsUpdate = true;
            } else {
                lipsMesh.visible = false; // Esconde se o rosto sair da câmera
            }
            renderer.render(scene, camera);
        }

        initThree();

        faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true, // Crucial para curvas precisas
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        faceMesh.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({ image: videoElement });
            },
            width: 640, height: 480
        });
        cameraUtils.start();

        // UI Listeners (Originais)
        const colors = { 'btn-red': 0xbe1e2d, 'btn-pink': 0xff4d6d, 'btn-nude': 0xf28b82, 'btn-dark': 0x4a0e1e, 'btn-black': 0x000000 };
        Object.keys(colors).forEach(id => {
            document.getElementById(id).addEventListener('click', (e) => {
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                e.target.classList.add('active');
                lipstickMaterial.uniforms.uColor.value.setHex(colors[id]);
            });
        });
        document.getElementById('opacitySlider').addEventListener('input', (e) => {
            lipstickMaterial.uniforms.uOpacity.value = parseFloat(e.target.value);
            document.getElementById('val').innerText = Math.round(e.target.value * 100) + "%";
        });
    </script>
</body>
</html>
