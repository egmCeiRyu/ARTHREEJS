<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>AR Lipstick - Banuba Realism Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --accent: #ff4d6d;
        }

        body {
            margin: 0;
            background: #050505;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            color: #fff;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 20px 60px rgba(0,0,0,.8);
        }

        video, #three_container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            object-fit: cover;
        }

        .ui-panel {
            margin-top: 25px;
            background: rgba(20,20,20,.95);
            padding: 20px;
            border-radius: 25px;
            width: 550px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #444;
            backdrop-filter: blur(10px);
        }

        .swatches {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .swatch {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: .2s;
        }

            .swatch.active {
                border-color: #fff;
                transform: scale(1.1);
                box-shadow: 0 0 15px rgba(255,255,255,.2);
            }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="three_container"></div>
    </div>

    <div class="ui-panel">
        <div class="swatches">
            <div class="swatch active" style="background:#be1e2d" onclick="changeColor(0xbe1e2d,this)"></div>
            <div class="swatch" style="background:#ff4d6d" onclick="changeColor(0xff4d6d,this)"></div>
            <div class="swatch" style="background:#f28b82" onclick="changeColor(0xf28b82,this)"></div>
            <div class="swatch" style="background:#4a0e1e" onclick="changeColor(0x4a0e1e,this)"></div>
            <div class="swatch" style="background:#000000" onclick="changeColor(0x000000,this)"></div>
        </div>
        <div class="slider-container" style="width: 100%;">
            <input type="range" id="opacitySlider" min="0.1" max="1" step="0.01" value="0.5" oninput="updateOpacity(this.value)">
            <div style="display:flex; justify-content: space-between; font-size: 10px; color: #888; margin-top: 5px;">
                <span>NATURAL</span><span id="int-val">50%</span><span>VIVID</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        let faceLandmarker, scene, camera, renderer, lipMesh, lipMaterial;
        let smoothed = null;
        let lastVideoTime = -1;

        const OUTER = [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 375, 321, 405, 314, 17, 84, 181, 91, 146, 61];
        const INNER = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78];

        async function init() {
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numFaces: 1
            });

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 10);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(640, 480);
            document.getElementById("three_container").appendChild(renderer.domElement);

            // --- SHADER DE FUSÃO DE COR (Realismo Anatômico) ---
            // Este shader muda a cor mantendo as ranhuras e sombras reais da pele.
            lipMaterial = new THREE.ShaderMaterial({
                transparent: true,
                uniforms: {
                    uColor: { value: new THREE.Color(0xbe1e2d) },
                    uOpacity: { value: 0.5 }
                },
                vertexShader: `
                        varying vec2 vUv;
                        void main() {
                            vUv = uv;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                fragmentShader: `
                        uniform vec3 uColor;
                        uniform float uOpacity;
                        varying vec2 vUv;
                        void main() {
                            // Oclusão central suave para dar profundidade
                            float occlusion = mix(0.5, 1.0, smoothstep(0.0, 0.45, abs(vUv.y - 0.5)));

                            // Gloss focado (simula volume)
                            float gloss = pow(max(0.0, 1.0 - distance(vUv, vec2(0.5, 0.5)) * 2.5), 5.0) * 0.25;

                            // Mesclagem inteligente de cor (Skin Fusion)
                            vec3 finalColor = uColor * occlusion + vec3(gloss);

                            // Suavização extrema nas bordas (Alpha Falloff)
                            float edgeFade = smoothstep(0.0, 0.05, vUv.x) * smoothstep(1.0, 0.95, vUv.x) * smoothstep(0.0, 0.15, vUv.y) * smoothstep(1.0, 0.85, vUv.y);

                            gl_FragColor = vec4(finalColor, uOpacity * edgeFade);
                        }
                    `
            });

            lipMesh = new THREE.Mesh(new THREE.BufferGeometry(), lipMaterial);
            scene.add(lipMesh);
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } }).then(stream => {
                video.srcObject = stream;
                video.requestVideoFrameCallback(loop);
            });
        }

        function loop() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const result = faceLandmarker.detectForVideo(video, performance.now());
                if (result.faceLandmarks && result.faceLandmarks[0]) {
                    updateLips(result.faceLandmarks[0]);
                } else {
                    lipMesh.visible = false;
                    renderer.render(scene, camera);
                }
            }
            video.requestVideoFrameCallback(loop);
        }

        function updateLips(landmarks) {
            lipMesh.visible = true;
            // Suavização do movimento
            if (!smoothed) smoothed = landmarks.map(p => ({ x: p.x, y: p.y }));
            else {
                for (let i = 0; i < landmarks.length; i++) {
                    smoothed[i].x += (landmarks[i].x - smoothed[i].x) * 0.85;
                    smoothed[i].y += (landmarks[i].y - smoothed[i].y) * 0.85;
                }
            }

            const center = smoothed[13];
            const shape = new THREE.Shape();

            // --- GEOMETRIA PURA E ANATÔMICA (Sem Escala ou Distorção) ---
            OUTER.forEach((id, i) => {
                const p = smoothed[id];
                // Micro-ajuste (1.005) apenas para cobrir a borda, sem volume falso.
                const x = center.x + (p.x - center.x) * 1.005;
                const y = center.y + (p.y - center.y) * 1.005;
                if (i === 0) shape.moveTo(x, 1 - y);
                else shape.lineTo(x, 1 - y);
            });

            const hole = new THREE.Path();
            INNER.forEach((id, i) => {
                const p = smoothed[id];
                if (i === 0) hole.moveTo(p.x, 1 - p.y);
                else hole.lineTo(p.x, 1 - p.y);
            });
            shape.holes = [hole];

            if (lipMesh.geometry) lipMesh.geometry.dispose();
            lipMesh.geometry = new THREE.ShapeGeometry(shape, 4);

            // Mapeamento UV preciso para o Shader
            const pos = lipMesh.geometry.attributes.position;
            const bBox = new THREE.Box3().setFromBufferAttribute(pos);
            const size = new THREE.Vector3(); bBox.getSize(size);
            const uv = new Float32Array(pos.count * 2);
            for (let i = 0; i < pos.count; i++) {
                uv[i * 2] = (pos.getX(i) - bBox.min.x) / size.x;
                uv[i * 2 + 1] = (pos.getY(i) - bBox.min.y) / size.y;
            }
            lipMesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uv, 2));

            renderer.render(scene, camera);
        }

        window.changeColor = (hex, el) => {
            lipMaterial.uniforms.uColor.value.setHex(hex);
            document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
            el.classList.add("active");
        };

        window.updateOpacity = (v) => {
            lipMaterial.uniforms.uOpacity.value = v;
            document.getElementById("int-val").innerText = Math.round(v * 100) + "%";
        };

        init();
    </script>
</body>
</html>
