<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AR Lipstick HD - Elegant Lips Texture</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --accent: #ff4d6d;
        }

        body {
            margin: 0;
            background: #050505;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            color: #fff;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid #333;
        }

        video, #three_container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            object-fit: cover;
        }

        .ui-panel {
            margin-top: 25px;
            background: rgba(20,20,20,.95);
            padding: 20px;
            border-radius: 25px;
            width: 550px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #444;
            backdrop-filter: blur(10px);
        }

        .swatches {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .swatch {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
        }

            .swatch.active {
                border-color: #fff;
                transform: scale(1.1);
            }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="three_container"></div>
    </div>

    <div class="ui-panel">
        <div class="swatches">
            <div class="swatch active" style="background:#be1e2d" onclick="changeColor(0xbe1e2d,this)"></div>
            <div class="swatch" style="background:#ff4d6d" onclick="changeColor(0xff4d6d,this)"></div>
            <div class="swatch" style="background:#f28b82" onclick="changeColor(0xf28b82,this)"></div>
            <div class="swatch" style="background:#4a0e1e" onclick="changeColor(0x4a0e1e,this)"></div>
            <div class="swatch" style="background:#000000" onclick="changeColor(0x000000,this)"></div>
        </div>
        <div class="slider-container" style="width: 100%;">
            <input type="range" id="opacitySlider" min="0.1" max="1" step="0.01" value="0.6" oninput="updateOpacity(this.value)">
            <div style="display:flex; justify-content: space-between; font-size: 10px; color: #888; margin-top: 5px;">
                <span>NATURAL</span><span id="int-val">60%</span><span>VIVID</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        let faceLandmarker, scene, camera, renderer, lipMesh, lipMaterial, elegantNormalMap;
        let smoothed = null;
        let lastVideoTime = -1;

        const OUTER = [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 375, 321, 405, 314, 17, 84, 181, 91, 146, 61];
        const INNER = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78];

        async function init() {
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numFaces: 1
            });

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 10);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(640, 480);
            document.getElementById("three_container").appendChild(renderer.domElement);

            // --- GERAÇÃO PROCEDURAL DO NORMAL MAP ELEGANTE ---
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');

            // Fundo neutro do Normal Map (Azul/Roxo neutro: rgb(128,128,255))
            ctx.fillStyle = '#8080ff';
            ctx.fillRect(0, 0, 128, 128);

            // Criar ranhuras radiais/verticais finas
            ctx.lineWidth = 0.5;
            for (let i = 0; i < 128; i += 2) {
                // Variação sutil de cor para simular profundidade (entre rgb(100,128,255) e rgb(150,128,255))
                const bump = 128 + (Math.random() - 0.5) * 40;
                ctx.strokeStyle = `rgb(${bump}, 128, 255)`;

                // Desenha linhas que convergem levemente para o centro
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(64 + (i - 64) * 0.8, 128); // Linhas não perfeitamente verticais
                ctx.stroke();
            }

            elegantNormalMap = new THREE.CanvasTexture(canvas);
            elegantNormalMap.wrapS = elegantNormalMap.wrapT = THREE.RepeatWrapping;

            lipMaterial = new THREE.MeshPhongMaterial({
                color: 0xbe1e2d,
                transparent: true,
                opacity: 0.6,
                normalMap: elegantNormalMap,
                normalScale: new THREE.Vector2(0.4, 0.4), // Suavizado para elegância
                shininess: 50,
                specular: 0x222222, // Brilho suave
                side: THREE.DoubleSide,
                depthWrite: false
            });

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            // Luz direcional para destacar as novas ranhuras
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.3);
            directionalLight.position.set(0, 0, 1);
            scene.add(directionalLight);

            lipMesh = new THREE.Mesh(new THREE.BufferGeometry(), lipMaterial);
            scene.add(lipMesh);
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } }).then(stream => {
                video.srcObject = stream;
                video.requestVideoFrameCallback(loop);
            });
        }

        function loop() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const result = faceLandmarker.detectForVideo(video, performance.now());
                if (result.faceLandmarks && result.faceLandmarks[0]) {
                    updateLips(result.faceLandmarks[0]);
                }
            }
            video.requestVideoFrameCallback(loop);
        }

        function smooth(landmarks) {
            if (!smoothed) smoothed = landmarks.map(p => ({ x: p.x, y: p.y }));
            else {
                for (let i = 0; i < landmarks.length; i++) {
                    smoothed[i].x += (landmarks[i].x - smoothed[i].x) * 0.85;
                    smoothed[i].y += (landmarks[i].y - smoothed[i].y) * 0.85;
                }
            }
        }

        function updateLips(landmarks) {
            lipMesh.visible = true;
            smooth(landmarks);
            const center = smoothed[13];
            const shape = new THREE.Shape();
            OUTER.forEach((id, i) => {
                const p = smoothed[id];
                // Micro-escala para não criar aura
                const x = center.x + (p.x - center.x) * 1.01;
                const y = center.y + (p.y - center.y) * 1.01;
                if (i === 0) shape.moveTo(x, 1 - y);
                else shape.lineTo(x, 1 - y);
            });
            const hole = new THREE.Path();
            INNER.forEach((id, i) => {
                const p = smoothed[id];
                if (i === 0) hole.moveTo(p.x, 1 - p.y);
                else hole.lineTo(p.x, 1 - p.y);
            });
            shape.holes = [hole];
            if (lipMesh.geometry) lipMesh.geometry.dispose();
            lipMesh.geometry = new THREE.ShapeGeometry(shape, 4);

            // Mapeamento UV preciso para as ranhuras acompanharem a boca
            const pos = lipMesh.geometry.attributes.position;
            const bBox = new THREE.Box3().setFromBufferAttribute(pos);
            const size = new THREE.Vector3(); bBox.getSize(size);
            const uv = new Float32Array(pos.count * 2);
            for (let i = 0; i < pos.count; i++) {
                uv[i * 2] = (pos.getX(i) - bBox.min.x) / size.x;
                uv[i * 2 + 1] = (pos.getY(i) - bBox.min.y) / size.y;
            }
            lipMesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uv, 2));

            renderer.render(scene, camera);
        }

        window.changeColor = (hex, el) => {
            lipMaterial.color.setHex(hex);
            document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
            el.classList.add("active");
        };

        window.updateOpacity = (v) => {
            lipMaterial.opacity = v;
            document.getElementById("int-val").innerText = Math.round(v * 100) + "%";
        };

        init();
    </script>
</body>
</html>
