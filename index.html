<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AR Makeup - No Teeth Painting</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 30px;
            overflow: hidden;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        #three_container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            z-index: 10;
            pointer-events: none;
        }

        .ui {
            position: absolute;
            bottom: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 20px;
            width: 80%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .swatches {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
        }

        input[type=range] {
            width: 100%;
            accent-color: #ff4d6d;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="input_video" playsinline></video>
        <div id="three_container"></div>
        <div class="ui">
            <div class="swatches">
                <div class="swatch" style="background: #be1e2d;" onclick="changeColor(0xbe1e2d)"></div>
                <div class="swatch" style="background: #8e2a4e;" onclick="changeColor(0x8e2a4e)"></div>
                <div class="swatch" style="background: #ff4d6d;" onclick="changeColor(0xff4d6d)"></div>
            </div>
            <input type="range" min="0.1" max="0.9" step="0.01" value="0.4" oninput="updateOpacity(this.value)">
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        let scene, camera, renderer, lipMesh, material;
        let smoothedLandmarks = null;

        // 1. MAPEAMENTO DE PONTOS (EXTERNO E INTERNO)
        // Contorno que percorre a borda de fora da boca inteira
        const LIPS_OUTER = [61, 185, 40, 39, 37, 0, 267, 269, 270, 408, 415, 291, 375, 321, 405, 314, 17, 84, 181, 91, 146, 61];
        // Contorno que percorre a borda de dentro (onde a boca abre)
        const LIPS_INNER = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 1000);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(640, 480);
            document.getElementById('three_container').appendChild(renderer.domElement);

            material = new THREE.MeshBasicMaterial({
                color: 0xbe1e2d,
                transparent: true,
                opacity: 0.4,
                side: THREE.DoubleSide
            });

            // Criamos uma geometria vazia inicial
            const geometry = new THREE.BufferGeometry();
            lipMesh = new THREE.Mesh(geometry, material);
            scene.add(lipMesh);
        }

        window.changeColor = (hex) => { material.color.setHex(hex); };
        window.updateOpacity = (val) => { material.opacity = val; };

        function onResults(results) {
            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;

            const landmarks = results.multiFaceLandmarks[0];

            // Suavização
            if (!smoothedLandmarks) {
                smoothedLandmarks = landmarks;
            } else {
                smoothedLandmarks = landmarks.map((p, i) => ({
                    x: smoothedLandmarks[i].x * 0.7 + p.x * 0.3,
                    y: smoothedLandmarks[i].y * 0.7 + p.y * 0.3
                }));
            }

            // --- NOVA LÓGICA DE GEOMETRIA COM FURO ---

            // 1. Criar a Forma Externa (O formato do batom)
            const mouthShape = new THREE.Shape();
            const startOuter = smoothedLandmarks[LIPS_OUTER[0]];
            mouthShape.moveTo(startOuter.x, 1 - startOuter.y);

            for (let i = 1; i < LIPS_OUTER.length; i++) {
                const p = smoothedLandmarks[LIPS_OUTER[i]];
                mouthShape.lineTo(p.x, 1 - p.y);
            }

            // 2. Criar a Forma Interna (O buraco da boca)
            const holePath = new THREE.Path();
            const startInner = smoothedLandmarks[LIPS_INNER[0]];
            holePath.moveTo(startInner.x, 1 - startInner.y);

            for (let i = 1; i < LIPS_INNER.length; i++) {
                const p = smoothedLandmarks[LIPS_INNER[i]];
                holePath.lineTo(p.x, 1 - p.y);
            }

            // 3. Adicionar o buraco à forma principal
            mouthShape.holes.push(holePath);

            // 4. Gerar a geometria a partir da forma (Isso triangula automaticamente com o furo)
            const geometry = new THREE.ShapeGeometry(mouthShape);

            // 5. Atualizar a malha existente com a nova geometria
            // No Three.js, é mais eficiente dispose() da geometria antiga e set a nova
            lipMesh.geometry.dispose();
            lipMesh.geometry = geometry;

            renderer.render(scene, camera);
        }

        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        faceMesh.onResults(onResults);

        const cameraHelper = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({ image: videoElement }); },
            width: 640, height: 480
        });

        init();
        cameraHelper.start();
    </script>
</body>
</html>
