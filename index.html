<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Makeup Studio - Three.js Shader</title>
    <style>
        :root {
            --accent: #ff4d6d;
        }

        body {
            margin: 0;
            background: #050505;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid #333;
            background: black;
        }

        /* Camadas de Vídeo e Render */
        #input-video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #three-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            transform: scaleX(-1);
        }

        .ui-panel {
            margin-top: 20px;
            background: rgba(25, 25, 25, 0.95);
            padding: 25px;
            border-radius: 30px;
            width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #444;
            backdrop-filter: blur(15px);
            z-index: 10;
        }

        .swatches {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 22px;
        }

        .swatch {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.3s;
        }

            .swatch.active {
                border-color: white;
                transform: scale(1.2);
                box-shadow: 0 0 15px var(--accent);
            }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
            height: 6px;
        }

        .labels {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 11px;
            color: #888;
            margin-top: 10px;
            font-weight: bold;
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #222;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="loading">
            <div class="spinner"></div>
            <p style="margin-top:15px; font-size:12px; color: #666;">INITIALIZING SHADER ENGINE...</p>
        </div>
        <video id="input-video" autoplay playsinline></video>
        <canvas id="three-canvas"></canvas>
    </div>

    <div class="ui-panel">
        <div class="swatches">
            <div id="btn-red" class="swatch active" style="background: #be1e2d;"></div>
            <div id="btn-pink" class="swatch" style="background: #ff4d6d;"></div>
            <div id="btn-nude" class="swatch" style="background: #f28b82;"></div>
            <div id="btn-dark" class="swatch" style="background: #4a0e1e;"></div>
            <div id="btn-black" class="swatch" style="background: #000000;"></div>
        </div>
        <div style="width:100%">
            <input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="0.6">
            <div class="labels"><span>NATURAL</span><span id="val">60%</span><span>VIVID</span></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('three-canvas');
        const loadingElement = document.getElementById('loading');

        let scene, camera, renderer, lipsMesh, lipstickMaterial;
        let faceMesh;

        // --- ÍNDICES DOS LÁBIOS (MediaPipe FaceMesh) ---
        const LIP_INDICES = [
            61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 306, 292, 415, 310, 311, 312, 13, 82, 81, 80, 191, 78, 62, 76, 61
        ];

        // --- SHADERS GLSL PARA QUALIDADE PROFISSIONAL ---
        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform vec3 uColor;
            uniform float uOpacity;
            varying vec2 vUv;
            varying vec3 vNormal;
            void main() {
                float fresnel = pow(1.5 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
                vec3 color = mix(uColor, uColor * 0.7, fresnel);
                gl_FragColor = vec4(color, uOpacity);
            }
        `;

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.Camera(); // MediaPipe usa clip space (-1 a 1)

            renderer = new THREE.WebGLRenderer({ canvas: canvasElement, alpha: true, antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(640, 480);

            lipstickMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uColor: { value: new THREE.Color(0xbe1e2d) },
                    uOpacity: { value: 0.6 }
                },
                vertexShader,
                fragmentShader,
                transparent: true,
                side: THREE.DoubleSide
            });

            const geometry = new THREE.BufferGeometry();
            lipsMesh = new THREE.Mesh(geometry, lipstickMaterial);
            scene.add(lipsMesh);
        }

        function onResults(results) {
            loadingElement.style.display = 'none';

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                const positions = [];
                const indices = [];

                // Converte landmarks em coordenadas Three.js
                LIP_INDICES.forEach((idx) => {
                    const p = landmarks[idx];
                    positions.push((p.x - 0.5) * 2, (0.5 - p.y) * 2, -p.z * 2);
                });

                // Cria triângulos simples (Fan format)
                for (let i = 1; i < LIP_INDICES.length - 1; i++) {
                    indices.push(0, i, i + 1);
                }

                lipsMesh.geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                lipsMesh.geometry.setIndex(indices);
                lipsMesh.geometry.computeVertexNormals();
                lipsMesh.geometry.attributes.position.needsUpdate = true;
            }
            renderer.render(scene, camera);
        }

        // --- CONTROLES DE UI ---
        const colors = {
            'btn-red': 0xbe1e2d,
            'btn-pink': 0xff4d6d,
            'btn-nude': 0xf28b82,
            'btn-dark': 0x4a0e1e,
            'btn-black': 0x000000
        };

        Object.keys(colors).forEach(id => {
            document.getElementById(id).addEventListener('click', (e) => {
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                e.target.classList.add('active');
                lipstickMaterial.uniforms.uColor.value.setHex(colors[id]);
            });
        });

        document.getElementById('opacitySlider').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('val').innerText = Math.round(val * 100) + "%";
            lipstickMaterial.uniforms.uOpacity.value = parseFloat(val);
        });

        // --- INICIALIZAÇÃO ---
        initThree();

        faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        faceMesh.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({ image: videoElement }); },
            width: 640, height: 480
        });
        cameraUtils.start();

    </script>
</body>
</html>
