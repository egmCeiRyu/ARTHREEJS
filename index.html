<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AR Makeup - Three.js Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 15px;
            overflow: hidden;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            object-fit: cover;
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            z-index: 5;
            pointer-events: none;
        }

        .ui {
            z-index: 10;
            margin-top: 20px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            border: 1px solid #333;
        }

        .swatch {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .active {
            border-color: white;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="input_video"></video>
        <div id="three_container"></div>
    </div>

    <div class="ui">
        <div class="swatch active" style="background: #be1e2d;" onclick="updateLip(0xbe1e2d, this)"></div>
        <div class="swatch" style="background: #8e2a4e;" onclick="updateLip(0x8e2a4e, this)"></div>
        <div class="swatch" style="background: #f28b82;" onclick="updateLip(0xf28b82, this)"></div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        let scene, camera, renderer, lipMesh, lipstickMaterial;
        let smoothedLandmarks = null;

        function initThree() {
            scene = new THREE.Scene();
            // Câmera ortográfica para alinhar 1:1 com os pontos da IA
            camera = new THREE.OrthographicCamera(-0.5, 0.5, 0.5, -0.5, 0.1, 10);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(640, 480);
            document.getElementById('three_container').appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            lipstickMaterial = new THREE.MeshPhongMaterial({
                color: 0xbe1e2d,
                transparent: true,
                opacity: 0.6,
                shininess: 100,
                specular: 0x444444,
                side: THREE.DoubleSide
            });

            const geometry = new THREE.BufferGeometry();
            lipMesh = new THREE.Mesh(geometry, lipstickMaterial);
            scene.add(lipMesh);
        }

        window.updateLip = (hex, el) => {
            lipstickMaterial.color.setHex(hex);
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        };

        // Índice dos lábios externos
        const LIPS = [61, 185, 40, 39, 37, 0, 267, 269, 270, 408, 415, 291, 375, 321, 405, 314, 17, 84, 181, 91, 146, 61];

        function onResults(results) {
            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;

            const landmarks = results.multiFaceLandmarks[0];

            // Suavização (Smoothing)
            if (!smoothedLandmarks) {
                smoothedLandmarks = landmarks;
            } else {
                smoothedLandmarks = landmarks.map((p, i) => ({
                    x: smoothedLandmarks[i].x * 0.7 + p.x * 0.3,
                    y: smoothedLandmarks[i].y * 0.7 + p.y * 0.3
                }));
            }

            const vertices = [];
            LIPS.forEach(idx => {
                const p = smoothedLandmarks[idx];
                // Normalizando para o sistema do Three.js (-0.5 a 0.5)
                vertices.push(p.x - 0.5, 0.5 - p.y, 0);
            });

            const vArray = new Float32Array(vertices);
            lipMesh.geometry.setAttribute('position', new THREE.BufferAttribute(vArray, 3));
            lipMesh.geometry.computeVertexNormals();

            renderer.render(scene, camera);
        }

        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        faceMesh.onResults(onResults);

        const cameraHelper = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({ image: videoElement }); },
            width: 640, height: 480
        });

        initThree();
        cameraHelper.start();
    </script>

</body>
</html>
