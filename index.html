<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AR Makeup Pro - Three.js Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            background: #000;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        #three_container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            z-index: 10;
            pointer-events: none;
        }

        /* Interface Moderna */
        .ui-panel {
            position: absolute;
            bottom: 20px;
            z-index: 20;
            background: rgba(20,20,20,0.85);
            padding: 20px;
            border-radius: 25px;
            width: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(10px);
            border: 1px solid #333;
            left: 50%;
            transform: translateX(-50%);
        }

        .swatches {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .swatch {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

            .swatch.active {
                border-color: white;
                transform: scale(1.15);
            }

        .slider-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type=range] {
            width: 100%;
            accent-color: #ff4d6d;
            cursor: pointer;
            height: 6px;
            border-radius: 5px;
        }

        .labels {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 10px;
            color: #888;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="input_video" playsinline></video>
        <div id="three_container"></div>

        <div class="ui-panel">
            <div class="swatches">
                <div class="swatch active" style="background: #be1e2d;" onclick="changeColor(0xbe1e2d, this)"></div>
                <div class="swatch" style="background: #8e2a4e;" onclick="changeColor(0x8e2a4e, this)"></div>
                <div class="swatch" style="background: #ff4d6d;" onclick="changeColor(0xff4d6d, this)"></div>
                <div class="swatch" style="background: #f28b82;" onclick="changeColor(0xf28b82, this)"></div>
                <div class="swatch" style="background: #4a0e1e;" onclick="changeColor(0x4a0e1e, this)"></div>
            </div>

            <div class="slider-container">
                <input type="range" id="intensitySlider" min="0.1" max="0.9" step="0.01" value="0.4" oninput="updateIntensity(this.value)">
                <div class="labels">
                    <span>Natural</span>
                    <span id="int-val">40%</span>
                    <span>Vivid</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        let scene, camera, renderer, lipMesh, material;
        let smoothedLandmarks = null;

        function init() {
            scene = new THREE.Scene();
            // Câmera Ortográfica configurada para ler o plano 0 a 1 do MediaPipe
            camera = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 1000);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(640, 480);
            document.getElementById('three_container').appendChild(renderer.domElement);

            // Usamos MeshBasicMaterial para garantir visibilidade estável
            material = new THREE.MeshBasicMaterial({
                color: 0xbe1e2d,
                transparent: true,
                opacity: 0.4,
                side: THREE.DoubleSide
            });

            const geometry = new THREE.BufferGeometry();
            lipMesh = new THREE.Mesh(geometry, material);
            scene.add(lipMesh);
        }

        // Funções de controle da UI
        window.changeColor = (hex, el) => {
            material.color.setHex(hex);
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        };

        window.updateIntensity = (val) => {
            material.opacity = val;
            document.getElementById('int-val').innerText = Math.round(val * 100) + "%";
        };

        // Índices da Malha Facial (Lábio Externo)
        const LIPS = [61, 185, 40, 39, 37, 0, 267, 269, 270, 408, 415, 291, 375, 321, 405, 314, 17, 84, 181, 91, 146, 61];

        function onResults(results) {
            if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;

            const landmarks = results.multiFaceLandmarks[0];

            // Estabilização Suave (Lerp)
            if (!smoothedLandmarks) {
                smoothedLandmarks = landmarks;
            } else {
                smoothedLandmarks = landmarks.map((p, i) => ({
                    x: smoothedLandmarks[i].x * 0.75 + p.x * 0.25,
                    y: smoothedLandmarks[i].y * 0.75 + p.y * 0.25
                }));
            }

            const vertices = [];
            LIPS.forEach(idx => {
                const p = smoothedLandmarks[idx];
                // Mapeamento 1:1 para a câmera ortográfica
                vertices.push(p.x, 1 - p.y, 0);
            });

            const vArray = new Float32Array(vertices);
            lipMesh.geometry.setAttribute('position', new THREE.BufferAttribute(vArray, 3));
            renderer.render(scene, camera);
        }

        const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        faceMesh.onResults(onResults);

        const cameraHelper = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({ image: videoElement }); },
            width: 640, height: 480
        });

        init();
        cameraHelper.start();
    </script>
</body>
</html>
