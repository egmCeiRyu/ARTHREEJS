<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>AR Lipstick - Sync Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --accent: #ff4d6d; }
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        #container { position: relative; width: 640px; height: 480px; border-radius: 30px; overflow: hidden; border: 1px solid #333; }
        video, #three_container { position: absolute; width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }
        .ui-panel { margin-top: 20px; background: rgba(15,15,15,.9); padding: 20px; border-radius: 20px; width: 550px; border: 1px solid #444; backdrop-filter: blur(10px); }
        .swatches { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 20px; }
        .swatch { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .swatch.active { border-color: #fff; transform: scale(1.15); }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>

    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="three_container"></div>
    </div>

    <div class="ui-panel">
        <div class="swatches">
            <div class="swatch active" style="background:#be1e2d" onclick="changeColor(0xbe1e2d,this)"></div>
            <div class="swatch" style="background:#a67c7c" onclick="changeColor(0xa67c7c,this)"></div>
            <div class="swatch" style="background:#4a0e1e" onclick="changeColor(0x4a0e1e,this)"></div>
            <div class="swatch" style="background:#c2185b" onclick="changeColor(0xc2185b,this)"></div>
            <div class="swatch" style="background:#ff8b6a" onclick="changeColor(0xff8b6a,this)"></div>
            <div class="swatch" style="background:#5e1e5e" onclick="changeColor(0x5e1e5e,this)"></div>
            <div class="swatch" style="background:#964b00" onclick="changeColor(0x964b00,this)"></div>
            <div class="swatch" style="background:#000000" onclick="changeColor(0x000000,this)"></div>
        </div>
        <input type="range" id="opacitySlider" min="0.1" max="1" step="0.01" value="0.55" oninput="updateOpacity(this.value)">
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        let faceLandmarker, scene, camera, renderer, lipMesh, lipMaterial;
        let smoothed = null;
        let lastVideoTime = -1;

        const MESH_MAP = [
            [61, 78, 185], [185, 78, 191], [185, 191, 40], [40, 191, 80], [40, 80, 39], [39, 80, 81], [39, 81, 37], [37, 81, 82], [37, 82, 0], [0, 82, 13], [0, 13, 267], [267, 13, 312], [267, 312, 269], [269, 312, 311], [269, 311, 270], [270, 311, 310], [270, 310, 409], [409, 310, 415], [409, 415, 291], [291, 415, 308],
            [291, 308, 375], [375, 308, 324], [375, 324, 321], [321, 324, 318], [321, 318, 405], [405, 318, 402], [405, 402, 314], [314, 402, 317], [314, 317, 17], [17, 317, 14], [17, 14, 84], [84, 14, 87], [84, 87, 181], [181, 87, 178], [181, 178, 91], [91, 178, 88], [91, 88, 146], [146, 88, 95], [146, 95, 61], [61, 95, 78]
        ];

        async function init() {
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numFaces: 1
            });

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 10);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(640, 480);
            renderer.setPixelRatio(1);
            document.getElementById("three_container").appendChild(renderer.domElement);

            lipMaterial = new THREE.ShaderMaterial({
                transparent: true,
                side: THREE.DoubleSide,
                uniforms: { 
                    uColor: { value: new THREE.Color(0xbe1e2d) }, 
                    uOpacity: { value: 1.0 } // Valor temporário
                },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform vec3 uColor; uniform float uOpacity; varying vec2 vUv;
                    void main() {
                        float mask = smoothstep(0.0, 0.12, vUv.x) * smoothstep(1.0, 0.88, vUv.x);
                        float occ = mix(0.75, 1.0, smoothstep(0.0, 0.45, abs(vUv.y - 0.5)));
                        float g1 = pow(max(0.0, 1.0 - distance(vUv, vec2(0.5, 0.75)) * 3.0), 6.0) * 0.45;
                        float g2 = pow(max(0.0, 1.0 - distance(vUv, vec2(0.5, 0.25)) * 3.5), 6.0) * 0.40;
                        gl_FragColor = vec4(uColor * occ + vec3(g1 + g2), uOpacity * mask);
                    }
                `
            });

            // --- CORREÇÃO AQUI: Sincroniza o valor do shader com o valor atual do slider ---
            const slider = document.getElementById("opacitySlider");
            lipMaterial.uniforms.uOpacity.value = parseFloat(slider.value);

            lipMesh = new THREE.Mesh(new THREE.BufferGeometry(), lipMaterial);
            scene.add(lipMesh);
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, frameRate: { ideal: 60 } } }).then(s => {
                video.srcObject = s; video.requestVideoFrameCallback(loop);
            });
        }

        function loop() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const result = faceLandmarker.detectForVideo(video, performance.now());
                if (result.faceLandmarks?.[0]) updateLips(result.faceLandmarks[0]);
            }
            video.requestVideoFrameCallback(loop);
        }

        function updateLips(landmarks) {
            const ALPHA = 0.95; 
            if (!smoothed) smoothed = landmarks.map(p => ({ x: p.x, y: p.y }));
            else {
                for (let i = 0; i < landmarks.length; i++) {
                    smoothed[i].x += (landmarks[i].x - smoothed[i].x) * ALPHA;
                    smoothed[i].y += (landmarks[i].y - smoothed[i].y) * ALPHA;
                }
            }

            const vertices = new Float32Array(MESH_MAP.length * 3 * 3);
            const uvs = new Float32Array(MESH_MAP.length * 3 * 2);

            MESH_MAP.forEach((tri, i) => {
                tri.forEach((id, j) => {
                    const p = smoothed[id];
                    const idx = (i * 3 + j);
                    vertices[idx * 3] = p.x;
                    vertices[idx * 3 + 1] = 1 - p.y;
                    vertices[idx * 3 + 2] = 0;
                    uvs[idx * 2] = (p.x - smoothed[61].x) / (smoothed[291].x - smoothed[61].x + 0.001);
                    uvs[idx * 2 + 1] = (p.y - smoothed[37].y) / (smoothed[17].y - smoothed[37].y + 0.001);
                });
            });

            lipMesh.geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            lipMesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
            lipMesh.geometry.computeVertexNormals();
            lipMesh.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        window.changeColor = (hex, el) => {
            lipMaterial.uniforms.uColor.value.setHex(hex);
            document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
            el.classList.add("active");
        };

        window.updateOpacity = (v) => { 
            lipMaterial.uniforms.uOpacity.value = parseFloat(v); 
        };

        init();
    </script>
</body>
</html>
