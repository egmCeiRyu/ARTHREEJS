<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>AR Lipstick - Banuba Style</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --accent: #ff4d6d; }
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #fff; }
        #container { position: relative; width: 640px; height: 480px; border-radius: 30px; overflow: hidden; border: 1px solid #333; }
        video, #three_container { position: absolute; width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }
        .ui-panel { margin-top: 20px; background: rgba(15,15,15,.9); padding: 20px; border-radius: 20px; width: 500px; border: 1px solid #444; backdrop-filter: blur(10px); }
        .swatches { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .swatch { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s; }
        .swatch.active { border-color: #fff; transform: scale(1.15); }
        input[type=range] { width: 100%; accent-color: var(--accent); }
        label { font-size: 12px; color: #aaa; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="three_container"></div>
    </div>

    <div class="ui-panel">
        <div class="swatches">
            <div class="swatch active" style="background:#be1e2d" onclick="changeColor(0xbe1e2d,this)"></div>
            <div class="swatch" style="background:#ff4d6d" onclick="changeColor(0xff4d6d,this)"></div>
            <div class="swatch" style="background:#c2185b" onclick="changeColor(0xc2185b,this)"></div>
            <div class="swatch" style="background:#4a0e1e" onclick="changeColor(0x4a0e1e,this)"></div>
            <div class="swatch" style="background:#7b1fa2" onclick="changeColor(0x7b1fa2,this)"></div>
            <div class="swatch" style="background:#000000" onclick="changeColor(0x000000,this)"></div>
        </div>
        <label>Opacidade</label>
        <input type="range" id="opacitySlider" min="0.1" max="1" step="0.01" value="0.65" oninput="updateOpacity(this.value)">
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        let faceLandmarker, scene, camera, renderer, lipMesh, lipMaterial;
        let smoothed = null;
        let lastVideoTime = -1;

        // ─── LANDMARK IDs ─────────────────────────────────────────────────────────
        // Lábio superior externo: da comissura esquerda → cupido → comissura direita
        const UPPER_L  = [61, 185, 40, 39, 37];   // esquerda até pico cupido esq
        const UPPER_C  = [0];                       // centro do cupido (vale)
        const UPPER_R  = [267, 269, 270, 409, 291]; // pico cupido dir → comissura dir

        // Lábio inferior externo
        const LOWER    = [291, 375, 321, 405, 314, 17, 84, 181, 91, 146, 61];

        // Abertura interna da boca (hole)
        const INNER    = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308,
                          324, 318, 402, 317, 14, 87, 178, 88, 95, 78];

        // ─── THREE.JS INIT ─────────────────────────────────────────────────────────
        async function init() {
            const filesetResolver = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numFaces: 1
            });

            scene    = new THREE.Scene();
            camera   = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 10);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(640, 480);
            document.getElementById("three_container").appendChild(renderer.domElement);

            lipMaterial = new THREE.ShaderMaterial({
                transparent: true,
                depthWrite: false,
                uniforms: {
                    uColor:   { value: new THREE.Color(0xbe1e2d) },
                    uOpacity: { value: 0.65 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3  uColor;
                    uniform float uOpacity;
                    varying vec2  vUv;

                    void main() {
                        // Máscara suave nas bordas
                        float mx = smoothstep(0.0, 0.07, vUv.x) * smoothstep(1.0, 0.93, vUv.x);
                        float my = smoothstep(0.0, 0.10, vUv.y) * smoothstep(1.0, 0.90, vUv.y);
                        float mask = mx * my;

                        // Micro-sombra nas bordas laterais (depth)
                        float occ = mix(0.72, 1.0, smoothstep(0.0, 0.35, abs(vUv.y - 0.5)));

                        // Gloss: dois reflexos — lábio superior e inferior
                        float g1 = pow(max(0.0, 1.0 - distance(vUv, vec2(0.5, 0.72)) * 4.0), 5.0) * 0.5;
                        float g2 = pow(max(0.0, 1.0 - distance(vUv, vec2(0.5, 0.25)) * 4.0), 5.0) * 0.45;
                        vec3 gloss = vec3(g1 + g2);

                        gl_FragColor = vec4(uColor * occ + gloss, mask * uOpacity);
                    }
                `
            });

            lipMesh = new THREE.Mesh(new THREE.BufferGeometry(), lipMaterial);
            scene.add(lipMesh);

            startCamera();
        }

        // ─── CÂMERA ────────────────────────────────────────────────────────────────
        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: "user" } })
                .then(s => { video.srcObject = s; video.requestVideoFrameCallback(loop); });
        }

        function loop() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const result = faceLandmarker.detectForVideo(video, performance.now());
                if (result.faceLandmarks?.[0]) updateLips(result.faceLandmarks[0]);
            }
            video.requestVideoFrameCallback(loop);
        }

        // ─── SMOOTHING ─────────────────────────────────────────────────────────────
        const ALPHA = 0.75; // 0 = super suave, 1 = sem suavização

        function updateLips(landmarks) {
            if (!smoothed) {
                smoothed = landmarks.map(p => ({ x: p.x, y: p.y }));
            } else {
                for (let i = 0; i < landmarks.length; i++) {
                    smoothed[i].x += (landmarks[i].x - smoothed[i].x) * ALPHA;
                    smoothed[i].y += (landmarks[i].y - smoothed[i].y) * ALPHA;
                }
            }
            drawLips();
        }

        // ─── DESENHO DOS LÁBIOS ────────────────────────────────────────────────────
       function drawLips() {
            const center = smoothed[13]; 

            const pt = (id, sx = 1.12, sy = 1.0) => {
                const p = smoothed[id];
                return new THREE.Vector2(
                    center.x + (p.x - center.x) * sx,
                    1 - (center.y + (p.y - center.y) * sy)
                );
            };

            // --- AJUSTES DE ALTA DEFINIÇÃO (IGUAL À FOTO) ---
            const ptShaped = (id) => {
                switch (id) {
                    // Picos do Cupido (37, 267): Deixamos bem altos e definidos
                    case 37:  return pt(id, 1.10, 0.78); 
                    case 267: return pt(id, 1.10, 0.78); 
                    
                    // Vale do Cupido (0): Empurramos para BAIXO para criar o "V" profundo
                    case 0:   return pt(id, 1.05, 1.25); 

                    // Asas laterais (39, 40, 269, 270): Baixamos para não subir na pele
                    case 39:  case 269: return pt(id, 1.12, 0.95);
                    case 40:  case 270: return pt(id, 1.12, 1.02);
                    
                    // Cantos (61, 291): Travados em 1.0 para ficarem pontudos
                    case 61:  case 291: return pt(id, 1.0, 1.0);

                    // Lábio Inferior: Bem curvado e cheio
                    case 17:  return pt(id, 1.12, 1.25);
                    default:  return pt(id, 1.12, 1.0);
                }
            };

            const shape = new THREE.Shape();
            const p61 = ptShaped(61);
            shape.moveTo(p61.x, p61.y);

            // --- LADO SUPERIOR ESQUERDO ---
            const p37 = ptShaped(37);
            const p40 = ptShaped(40);
            // Curva que sai do canto e vai para o pico de forma arqueada
            shape.bezierCurveTo(p61.x, p61.y, p40.x, p40.y - 0.01, p37.x, p37.y);

            // --- O VALE DO CUPIDO (O SEGREDO DA FOTO) ---
            const p0 = ptShaped(0);
            const p267 = ptShaped(267);
            // Criamos uma descida e subida brusca para o "V" não ficar redondo
            shape.bezierCurveTo(p37.x + 0.01, p37.y + 0.02, p267.x - 0.01, p267.y + 0.02, p0.x, p0.y);
            shape.bezierCurveTo(p0.x, p0.y, p267.x - 0.01, p267.y + 0.02, p267.x, p267.y);

            // --- LADO SUPERIOR DIREITO ---
            const p291 = ptShaped(291);
            const p270 = ptShaped(270);
            shape.bezierCurveTo(p267.x, p267.y, p270.x, p270.y - 0.01, p291.x, p291.y);

            // --- LÁBIO INFERIOR (CONTORNO CHEIO) ---
            const p17 = ptShaped(17);
            shape.bezierCurveTo(p291.x, p291.y + 0.05, p17.x + 0.05, p17.y, p17.x, p17.y);
            shape.bezierCurveTo(p17.x - 0.05, p17.y, p61.x, p61.y + 0.05, p61.x, p61.y);

            // ── Furo interno (dentes / abertura) ──────────────────────────────────
            const hole = new THREE.Path();
            INNER.forEach((id, i) => {
                // Hole usa escala menor para não cobrir os dentes
                const p = pt(id, 1.05, 1.0);
                i === 0 ? hole.moveTo(p.x, p.y) : hole.lineTo(p.x, p.y);
            });
            shape.holes = [hole];

            // ── Geometry + UV ─────────────────────────────────────────────────────
            if (lipMesh.geometry) lipMesh.geometry.dispose();
            lipMesh.geometry = new THREE.ShapeGeometry(shape, 24);

            const pos  = lipMesh.geometry.attributes.position;
            const bbox = new THREE.Box3().setFromBufferAttribute(pos);
            const size = new THREE.Vector3();
            bbox.getSize(size);

            const uv = new Float32Array(pos.count * 2);
            for (let i = 0; i < pos.count; i++) {
                uv[i * 2]     = (pos.getX(i) - bbox.min.x) / size.x;
                uv[i * 2 + 1] = (pos.getY(i) - bbox.min.y) / size.y;
            }
            lipMesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uv, 2));

            renderer.render(scene, camera);
        }

        // ─── CONTROLES ─────────────────────────────────────────────────────────────
        window.changeColor = (hex, el) => {
            lipMaterial.uniforms.uColor.value.setHex(hex);
            document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
            el.classList.add("active");
        };

        window.updateOpacity = (v) => {
            lipMaterial.uniforms.uOpacity.value = parseFloat(v);
        };

        init();
    </script>
</body>
</html>
