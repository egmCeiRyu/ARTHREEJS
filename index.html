<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Makeup Pro - Curved Shader</title>
    <style>
        :root {
            --accent: #ff4d6d;
        }

        body {
            margin: 0;
            background: #000;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #333;
            background: #000;
        }

        video#input-video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            visibility: hidden;
        }

        canvas#three-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            transform: scaleX(-1);
        }

        .ui-panel {
            margin-top: 20px;
            background: rgba(25, 25, 25, 0.95);
            padding: 25px;
            border-radius: 30px;
            width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #444;
            backdrop-filter: blur(15px);
            z-index: 10;
        }

        .swatches {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 22px;
        }

        .swatch {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.3s;
        }

            .swatch.active {
                border-color: white;
                transform: scale(1.2);
                box-shadow: 0 0 15px var(--accent);
            }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
            height: 6px;
        }

        .labels {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 11px;
            color: #888;
            margin-top: 10px;
            font-weight: bold;
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #222;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="loading">
            <div class="spinner"></div>
            <p style="margin-top:15px; font-size:12px; color: #666;">INITIALIZING CURVED SHADER...</p>
        </div>
        <video id="input-video" autoplay playsinline></video>
        <canvas id="three-canvas"></canvas>
    </div>

    <div class="ui-panel">
        <div class="swatches">
            <div id="btn-red" class="swatch active" style="background: #be1e2d;"></div>
            <div id="btn-pink" class="swatch" style="background: #ff4d6d;"></div>
            <div id="btn-nude" class="swatch" style="background: #f28b82;"></div>
            <div id="btn-dark" class="swatch" style="background: #4a0e1e;"></div>
            <div id="btn-black" class="swatch" style="background: #000000;"></div>
        </div>
        <div style="width:100%">
            <input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="0.6">
            <div class="labels"><span>NATURAL</span><span id="val">60%</span><span>VIVID</span></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const videoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('three-canvas');
        const loadingElement = document.getElementById('loading');

        let scene, camera, renderer, lipsMesh, lipstickMaterial;
        let faceMesh;

        // --- ÍNDICES REFINADOS (MediaPipe FaceMesh - Contorno e Volume) ---
        // Usamos landmarks internos e externos para criar tesselação
        const LIP_OUTLINE = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291];
        const LIP_INNER = [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 292, 306, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 185, 40, 39, 37, 0, 267, 269, 270, 409];

        // Combina para criar malha
        const ALL_LIP_INDICES = [...new Set([...LIP_OUTLINE, ...LIP_INNER])];

        // --- SHADERS AVANÇADOS PARA CURVAS E SUAVIZAÇÃO ---
        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vViewPosition;
            void main() {
                vUv = uv;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vViewPosition = -mvPosition.xyz;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            uniform vec3 uColor;
            uniform float uOpacity;
            varying vec2 vUv;
            varying vec3 vViewPosition;

            void main() {
                // 1. Fresnel Effect (Curvatura e Volume Profissional)
                // Simula como a luz bate nas dobras da boca
                vec3 viewDir = normalize(vViewPosition);
                // Criamos uma normal fake baseada na UV para suavizar
                vec3 fakeNormal = normalize(vec3(vUv.x - 0.5, vUv.y - 0.5, 1.0));

                float fresnel = pow(1.0 - dot(fakeNormal, viewDir), 2.5);

                // 2. Cor Base + Sombra de Bordas (mix)
                vec3 baseColor = mix(uColor, uColor * 0.3, fresnel);

                // 3. Suavização de Contorno (Soft Edge)
                // Isso remove o serrilhado e faz o batom parecer derreter na pele
                // Usamos a UV para calcular a distância do centro dos lábios
                float edgeDist = length(vUv - vec2(0.5, 0.5));
                float alphaMask = smoothstep(0.5, 0.3, edgeDist); // Suaviza de 0.5 a 0.3

                gl_FragColor = vec4(baseColor, uOpacity * alphaMask);
            }
        `;

        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.Camera(); // MediaPipe clip space

            renderer = new THREE.WebGLRenderer({ canvas: canvasElement, alpha: true, antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio); // Essencial para HD
            renderer.setSize(640, 480);

            lipstickMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uColor: { value: new THREE.Color(0xbe1e2d) },
                    uOpacity: { value: 0.6 }
                },
                vertexShader,
                fragmentShader,
                transparent: true,
                depthTest: false, // Evita vazar para dentro da boca
                side: THREE.DoubleSide
            });

            const geometry = new THREE.BufferGeometry();
            lipsMesh = new THREE.Mesh(geometry, lipstickMaterial);
            scene.add(lipsMesh);
        }

        // Função para criar triângulos de tesselação
        function triangulateLips(landmarks) {
            const positions = [];
            const uvs = [];
            const indices = [];

            // 1. Gerar Posições e UVs baseadas em landmarks
            ALL_LIP_INDICES.forEach((idx) => {
                const p = landmarks[idx];
                positions.push((p.x - 0.5) * 2, (0.5 - p.y) * 2, -p.z * 1.5); // Aumenta um pouco o Z para dar volume

                // UVs: MediaPipe x/y convertidos para 0-1
                uvs.push(p.x, p.y);
            });

            // 2. Criar Índices (Triângulos Complexos - Tesselação)
            // Esta lógica cria triângulos mais densos que o 'fan' simples
            for (let i = 0; i < LIP_OUTLINE.length - 1; i++) {
                indices.push(i, i + 1, LIP_OUTLINE.length + i);
                indices.push(i + 1, LIP_OUTLINE.length + i + 1, LIP_OUTLINE.length + i);
            }

            return { positions, uvs, indices };
        }

        function onResults(results) {
            loadingElement.style.display = 'none';

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                const { positions, uvs, indices } = triangulateLips(landmarks);

                lipsMesh.geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                lipsMesh.geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
                lipsMesh.geometry.setIndex(indices);

                lipsMesh.geometry.attributes.position.needsUpdate = true;
                lipsMesh.geometry.attributes.uv.needsUpdate = true;
            }
            renderer.render(scene, camera);
        }

        // --- MANTENDO OS CONTROLES DE UI ORIGINAIS ---
        const colors = {
            'btn-red': 0xbe1e2d,
            'btn-pink': 0xff4d6d,
            'btn-nude': 0xf28b82,
            'btn-dark': 0x4a0e1e,
            'btn-black': 0x000000
        };

        Object.keys(colors).forEach(id => {
            document.getElementById(id).addEventListener('click', (e) => {
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                e.target.classList.add('active');
                lipstickMaterial.uniforms.uColor.value.setHex(colors[id]);
            });
        });

        document.getElementById('opacitySlider').addEventListener('input', (e) => {
            const val = e.target.value;
            document.getElementById('val').innerText = Math.round(val * 100) + "%";
            lipstickMaterial.uniforms.uOpacity.value = parseFloat(val);
        });

        // --- INICIALIZAÇÃO ---
        initThree();

        faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
        // refinedLandmarks: true é crucial para o contorno dos lábios
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        faceMesh.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({ image: videoElement }); },
            width: 640, height: 480
        });
        cameraUtils.start();

    </script>
</body>
</html>
