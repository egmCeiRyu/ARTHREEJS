<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AR Makeup Studio - Lips Only Precision</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --accent: #ff4d6d;
            --bg-dark: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.95);
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
            color: white;
        }

        /* ビデオコンテナの設定（位置を中央に調整） */
        #container {
            position: relative;
            width: 640px;
            height: 480px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            border: 2px solid #222;
        }

        video, #three_container {
            position: absolute;
            width: 640px;
            height: 480px;
            transform: scaleX(-1);
            object-fit: cover;
        }

        /* UIパネル（カメラの下に配置） */
        .ui-panel {
            margin-top: 25px;
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 25px;
            width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        /* カラー選択タイトル */
        .ui-title {
            font-size: 14px;
            letter-spacing: 2px;
            color: #aaa;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* カラーパレット */
        .swatches {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

            .swatch:hover {
                transform: scale(1.1);
            }

            .swatch.active {
                border-color: white;
                transform: scale(1.15);
                box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            }

        /* 強度スライダー */
        .slider-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            cursor: pointer;
            height: 6px;
            border-radius: 5px;
        }

        .labels {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 11px;
            color: #666;
            margin-top: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <div id="three_container"></div>
    </div>

    <div class="ui-panel">
        <div class="ui-title">カラーを選択 (Selecione a Cor)</div>

        <div class="swatches">
            <div class="swatch active" style="background: #be1e2d;" onclick="changeColor(0xbe1e2d, this)"></div>
            <div class="swatch" style="background: #8e2a4e;" onclick="changeColor(0x8e2a4e, this)"></div>
            <div class="swatch" style="background: #5c162e;" onclick="changeColor(0x5c162e, this)"></div>
            <div class="swatch" style="background: #f28b82;" onclick="changeColor(0xf28b82, this)"></div>
            <div class="swatch" style="background: #ff4d6d;" onclick="changeColor(0xff4d6d, this)"></div>
            <div class="swatch" style="background: #c74375;" onclick="changeColor(0xc74375, this)"></div>
        </div>

        <div class="slider-container">
            <input type="range" id="opacitySlider" min="0.1" max="0.9" step="0.01" value="0.4" oninput="updateOpacity(this.value)">
            <div class="labels">
                <span>ナチュラル (Natural)</span>
                <span id="int-val">40%</span>
                <span>ビビッド (Vivid)</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        let faceLandmarker;
        let scene, camera, renderer, lipMesh, lipMaterial;
        let lastVideoTime = -1;
        let smoothedLandmarks = null;
        let currentRGB = { r: 190, g: 30, b: 45 }; // 初期カラー

        // 精密ランドマークインデックス（LIPS ONLY）
        const LIPS_OUTER = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 408, 270, 269, 267, 0, 37, 39, 40, 185, 61];
        const LIPS_INNER = [78, 95, 88, 178, 87, 14, 317, 402, 318, 324, 308, 415, 310, 311, 312, 13, 82, 81, 80, 191, 78];

        async function init() {
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numFaces: 1
            });

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 10);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(640, 480);
            renderer.setPixelRatio(1);
            document.getElementById('three_container').appendChild(renderer.domElement);

            lipMaterial = new THREE.MeshBasicMaterial({ color: 0xbe1e2d, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
            lipMesh = new THREE.Mesh(new THREE.BufferGeometry(), lipMaterial);
            scene.add(lipMesh);

            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            });
        }

        async function predictWebcam() {
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    updateLipsVisual(results.faceLandmarks[0]);
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        // カラー変更機能（明るさ検出付き）
        window.changeColor = (hex, el) => {
            // currentRGBを更新
            currentRGB.r = (hex >> 16) & 0xFF;
            currentRGB.g = (hex >> 8) & 0xFF;
            currentRGB.b = hex & 0xFF;

            lipMaterial.color.setHex(hex);
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        };

        window.updateOpacity = (val) => {
            lipMaterial.opacity = val;
            document.getElementById('int-val').innerText = Math.round(val * 100) + "%";
        };

        function updateLipsVisual(landmarks) {
            // --- 1. スムージング処理 ---
            if (!smoothedLandmarks) smoothedLandmarks = JSON.parse(JSON.stringify(landmarks));
            else {
                for (let i = 0; i < landmarks.length; i++) {
                    smoothedLandmarks[i].x = smoothedLandmarks[i].x * 0.4 + landmarks[i].x * 0.6;
                    smoothedLandmarks[i].y = smoothedLandmarks[i].y * 0.4 + landmarks[i].y * 0.6;
                }
            }

            // --- 2. 明るさ検出による描画モードの変更 ---
            const luminance = (currentRGB.r * 0.299) + (currentRGB.g * 0.587) + (currentRGB.b * 0.114);

            // --- 3. 精密ジオメトリ生成 (穴あけ処理付き) ---
            const mouthShape = new THREE.Shape();
            mouthShape.moveTo(smoothedLandmarks[LIPS_OUTER[0]].x, 1 - smoothedLandmarks[LIPS_OUTER[0]].y);
            LIPS_OUTER.forEach(i => mouthShape.lineTo(smoothedLandmarks[i].x, 1 - smoothedLandmarks[i].y));

            const holePath = new THREE.Path();
            holePath.moveTo(smoothedLandmarks[LIPS_INNER[0]].x, 1 - smoothedLandmarks[LIPS_INNER[0]].y);
            LIPS_INNER.forEach(i => holePath.lineTo(smoothedLandmarks[i].x, 1 - smoothedLandmarks[i].y));
            mouthShape.holes.push(holePath);

            lipMesh.geometry.dispose();

            if (luminance > 160) {
                // 明るい色：SourceOverモード（カバー力重視、少し不透明度を上げる）
                lipMesh.geometry = new THREE.ShapeGeometry(mouthShape, 12);
                lipMaterial.blending = THREE.NoBlending; // カバー力アップ
            } else {
                // 暗い色：Multiplyモード（自然な透け感、デフォルト）
                lipMesh.geometry = new THREE.ShapeGeometry(mouthShape);
                lipMaterial.blending = THREE.CustomBlending;
                lipMaterial.blendEquation = THREE.AddEquation;
                lipMaterial.blendSrc = THREE.DstColorFactor;
                lipMaterial.blendDst = THREE.ZeroFactor;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
