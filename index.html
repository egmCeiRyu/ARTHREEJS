<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>High-Speed AR Lips</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs" type="module"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --accent: #ff4d6d;
        }

        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }

        #container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 20px;
            overflow: hidden;
        }

        video, #three_container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        .ui-panel {
            margin-top: 20px;
            background: rgba(30, 30, 30, 0.9);
            padding: 15px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            color: white;
        }

        .swatches {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
        }

        .swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

            .swatch.active {
                border-color: white;
            }
    </style>
</head>
<body>

    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        <div id="three_container"></div>
    </div>

    <div class="ui-panel">
        <div class="swatches">
            <div class="swatch active" style="background: #be1e2d;" onclick="changeColor(0xbe1e2d, this)"></div>
            <div class="swatch" style="background: #ff4d6d;" onclick="changeColor(0xff4d6d, this)"></div>
            <div class="swatch" style="background: #4a0e1e;" onclick="changeColor(0x4a0e1e, this)"></div>
        </div>
        <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="0.5" oninput="updateOpacity(this.value)" style="width:80%">
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        let faceLandmarker, scene, camera, renderer, lipMesh, lipMaterial;
        let lastVideoTime = -1;

        // Reduzimos o Smoothing para 0.2 (antes era 0.75).
        // Quanto menor esse número, mais rápido o filtro segue o rosto.
        const SMOOTHING = 0.2;
        let smoothedLandmarks = null;

        const LIPS_OUTER = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 408, 270, 269, 267, 0, 37, 39, 40, 185, 61];
        const LIPS_INNER = [78, 95, 88, 178, 87, 14, 317, 402, 318, 324, 308, 415, 310, 311, 312, 13, 82, 81, 80, 191, 78];

        async function init() {
            const fileset = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(fileset, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                    delegate: "GPU" // Força o uso da placa de vídeo para velocidade máxima
                },
                runningMode: "VIDEO", numFaces: 1
            });

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 10);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false }); // Antialias off melhora FPS em mobile
            renderer.setSize(640, 480);
            document.getElementById('three_container').appendChild(renderer.domElement);

            lipMaterial = new THREE.MeshBasicMaterial({
                color: 0xbe1e2d, transparent: true, opacity: 0.5, side: THREE.DoubleSide
            });

            lipMesh = new THREE.Mesh(new THREE.BufferGeometry(), lipMaterial);
            scene.add(lipMesh);
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480, frameRate: { ideal: 30, max: 60 } }
            }).then((stream) => {
                video.srcObject = stream;
                video.requestVideoFrameCallback(predictWebcam); // Método mais eficiente que addEventListener
            });
        }

        function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks && results.faceLandmarks[0]) {
                    updateVisuals(results.faceLandmarks[0]);
                }
            }
            video.requestVideoFrameCallback(predictWebcam);
        }

        function updateVisuals(landmarks) {
            // Lógica de Smoothing Acelerada
            if (!smoothedLandmarks) {
                smoothedLandmarks = landmarks;
            } else {
                for (let i = 0; i < landmarks.length; i++) {
                    smoothedLandmarks[i].x += (landmarks[i].x - smoothedLandmarks[i].x) * (1 - SMOOTHING);
                    smoothedLandmarks[i].y += (landmarks[i].y - smoothedLandmarks[i].y) * (1 - SMOOTHING);
                }
            }

            const mouthShape = new THREE.Shape();

            // Desenho otimizado
            LIPS_OUTER.forEach((idx, i) => {
                const p = smoothedLandmarks[idx];
                if (i === 0) mouthShape.moveTo(p.x, 1 - p.y);
                else mouthShape.lineTo(p.x, 1 - p.y);
            });

            const holePath = new THREE.Path();
            LIPS_INNER.forEach((idx, i) => {
                const p = smoothedLandmarks[idx];
                if (i === 0) holePath.moveTo(p.x, 1 - p.y);
                else holePath.lineTo(p.x, 1 - p.y);
            });
            mouthShape.holes.push(holePath);

            if (lipMesh.geometry) lipMesh.geometry.dispose();
            lipMesh.geometry = new THREE.ShapeGeometry(mouthShape, 4); // Reduzido de 12 para 4 para processar mais rápido

            renderer.render(scene, camera);
        }

        window.changeColor = (hex, el) => {
            lipMaterial.color.setHex(hex);
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        };

        window.updateOpacity = (val) => { lipMaterial.opacity = val; };

        init();
    </script>
</body>
</html>
