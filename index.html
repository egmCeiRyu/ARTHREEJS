<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>AR Lipstick - Mesh Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --accent: #ff4d6d; }
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #fff; }
        #container { position: relative; width: 640px; height: 480px; border-radius: 30px; overflow: hidden; border: 1px solid #333; }
        video, #three_container { position: absolute; width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }
        .ui-panel { margin-top: 20px; background: rgba(15,15,15,.9); padding: 20px; border-radius: 20px; width: 500px; border: 1px solid #444; backdrop-filter: blur(10px); }
        .swatches { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .swatch { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .swatch.active { border-color: #fff; transform: scale(1.15); }
        input[type=range] { width: 100%; accent-color: var(--accent); }
    </style>
</head>
<body>

    <div id="container">
        <video id="webcam" autoplay playsinline muted></video>
        <div id="three_container"></div>
    </div>

    <div class="ui-panel">
        <div class="swatches">
            <div class="swatch active" style="background:#be1e2d" onclick="changeColor(0xbe1e2d,this)"></div>
            <div class="swatch" style="background:#ff4d6d" onclick="changeColor(0xff4d6d,this)"></div>
            <div class="swatch" style="background:#c2185b" onclick="changeColor(0xc2185b,this)"></div>
            <div class="swatch" style="background:#4a0e1e" onclick="changeColor(0x4a0e1e,this)"></div>
            <div class="swatch" style="background:#000000" onclick="changeColor(0x000000,this)"></div>
        </div>
        <input type="range" id="opacitySlider" min="0.1" max="1" step="0.01" value="0.65" oninput="updateOpacity(this.value)">
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        let faceLandmarker, scene, camera, renderer, lipMesh, lipMaterial;
        let smoothed = null;
        let lastVideoTime = -1;

        // MAPA DE MALHA (O shape volta aqui, conectando os pontos externos aos internos)
        const MESH_MAP = [
            [61, 185, 78], [185, 40, 191], [40, 39, 80], [39, 37, 81], [37, 0, 82], [0, 267, 13],
            [267, 269, 312], [269, 270, 311], [270, 409, 310], [409, 291, 415], [291, 308, 415],
            [291, 375, 308], [375, 321, 324], [321, 405, 318], [405, 314, 402], [314, 17, 317],
            [17, 84, 14], [84, 181, 87], [181, 91, 178], [91, 146, 88], [146, 61, 95], [61, 78, 95]
        ];

        async function init() {
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                runningMode: "VIDEO", numFaces: 1
            });

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(0, 1, 1, 0, 0.1, 10);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(640, 480);
            document.getElementById("three_container").appendChild(renderer.domElement);

            // MANTIDO: Seu Shader e UI
            lipMaterial = new THREE.ShaderMaterial({
                transparent: true,
                side: THREE.DoubleSide,
                uniforms: { uColor: { value: new THREE.Color(0xbe1e2d) }, uOpacity: { value: 0.65 } },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform vec3 uColor; uniform float uOpacity; varying vec2 vUv;
                    void main() {
                        float mask = smoothstep(0.0, 0.1, vUv.x) * smoothstep(1.0, 0.9, vUv.x) * smoothstep(0.0, 0.1, vUv.y) * smoothstep(1.0, 0.9, vUv.y);
                        float occ = mix(0.7, 1.0, smoothstep(0.0, 0.4, abs(vUv.y - 0.5)));
                        float upGloss = pow(max(0.0, 1.0 - distance(vUv, vec2(0.5, 0.78)) * 3.0), 4.0) * 0.4;
                        float loGloss = pow(max(0.0, 1.0 - distance(vUv, vec2(0.5, 0.22)) * 3.5), 5.0) * 0.4;
                        vec3 color = uColor * occ + (vec3(0.95, 0.95, 1.0) * (upGloss + loGloss));
                        gl_FragColor = vec4(color, uOpacity * mask);
                    }
                `
            });

            lipMesh = new THREE.Mesh(new THREE.BufferGeometry(), lipMaterial);
            scene.add(lipMesh);
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } }).then(s => {
                video.srcObject = s; video.requestVideoFrameCallback(loop);
            });
        }

        function loop() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const result = faceLandmarker.detectForVideo(video, performance.now());
                if (result.faceLandmarks && result.faceLandmarks[0]) updateLips(result.faceLandmarks[0]);
            }
            video.requestVideoFrameCallback(loop);
        }

        function updateLips(landmarks) {
            if (!smoothed) smoothed = landmarks.map(p => ({ x: p.x, y: p.y }));
            else {
                for (let i = 0; i < landmarks.length; i++) {
                    smoothed[i].x += (landmarks[i].x - smoothed[i].x) * 0.8;
                    smoothed[i].y += (landmarks[i].y - smoothed[i].y) * 0.8;
                }
            }

            const vertices = new Float32Array(MESH_MAP.length * 3 * 3);
            const uvs = new Float32Array(MESH_MAP.length * 3 * 2);

            // Reconstruindo o Shape através da Malha
            MESH_MAP.forEach((tri, i) => {
                tri.forEach((id, j) => {
                    const p = smoothed[id];
                    const idx = (i * 3 + j);
                    vertices[idx * 3] = p.x;
                    vertices[idx * 3 + 1] = 1 - p.y;
                    vertices[idx * 3 + 2] = 0;

                    // UV mapping baseado na posição relativa para o shader funcionar
                    uvs[idx * 2] = (p.x - smoothed[61].x) / (smoothed[291].x - smoothed[61].x);
                    uvs[idx * 2 + 1] = ( (1-p.y) - (1-smoothed[17].y) ) / ( (1-smoothed[0].y) - (1-smoothed[17].y) );
                });
            });

            lipMesh.geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            lipMesh.geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
            lipMesh.geometry.attributes.position.needsUpdate = true;
            lipMesh.geometry.attributes.uv.needsUpdate = true;

            renderer.render(scene, camera);
        }

        window.changeColor = (hex, el) => {
            lipMaterial.uniforms.uColor.value.setHex(hex);
            document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
            el.classList.add("active");
        };

        window.updateOpacity = (v) => { lipMaterial.uniforms.uOpacity.value = parseFloat(v); };

        init();
    </script>
</body>
</html>
